<?xml version="1.0" encoding="UTF-8"?>
<!-- Module 7.4 — runtime phase, dark variant. See *-light.svg for semantics. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 320" font-family="'Comic Sans MS', 'Segoe Print', 'Bradley Hand', cursive" font-size="18">
  <style>
    .label { fill: #f1f3f5; }
    .muted { fill: #ced4da; font-size: 14px; }
    .user-label  { fill: #74c0fc; font-size: 17px; font-style: italic; }
    .ext-label   { fill: #b197fc; font-size: 17px; font-style: italic; }
    .box-fill-blue   { fill: #1971c2; fill-opacity: 0.55; }
    .box-fill-green  { fill: #2f9e44; fill-opacity: 0.55; }
    .box-fill-purple { fill: #7048e8; fill-opacity: 0.55; }
    .box-stroke      { stroke: #f8f9fa; stroke-width: 2.2; stroke-linejoin: round; stroke-linecap: round; }
    .arrow           { stroke: #dee2e6; stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <text class="user-label" x="40" y="64">User applies</text>
  <text class="ext-label"  x="700" y="64">External world</text>

  <g>
    <path class="box-fill-blue box-stroke"
          d="M 60 116 C 58 108, 66 102, 76 102 L 264 104 C 274 104, 278 112, 276 120 L 274 192 C 274 202, 266 206, 256 206 L 70 204 C 60 204, 56 196, 58 188 Z" />
    <text class="label" text-anchor="middle" x="167" y="148">Release MR</text>
