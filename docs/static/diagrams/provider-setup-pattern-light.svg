<?xml version="1.0" encoding="UTF-8"?>
<!--
  Excalidraw-style diagram for module 5.4 §5.1 "The shape".
  Shows the Provider → ProviderConfig → MR three-step pattern,
  plus the Secret the ProviderConfig usually points at.

  Hand-authored SVG (no .excalidraw source).

  Color semantics (consistent with 101 diagrams):
    yellow #ffec99  = platform-engineer-applied (Provider, ProviderConfig)
    blue   #a5d8ff  = user-applied (MR)
    green  #b2f2bb  = runtime result (Provider Pod)
    purple #d0bfff  = external / operator-staged (Secret, External API)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 460" font-family="'Comic Sans MS', 'Segoe Print', 'Bradley Hand', cursive" font-size="18">
  <style>
    .label { fill: #1e1e1e; }
    .muted { fill: #495057; font-size: 14px; }
    .platform-label { fill: #b08900; font-size: 16px; font-style: italic; }
    .user-label     { fill: #1971c2; font-size: 16px; font-style: italic; }
    .ext-label      { fill: #6741d9; font-size: 16px; font-style: italic; }
    .box-fill-yellow { fill: #ffec99; }
    .box-fill-blue   { fill: #a5d8ff; }
    .box-fill-green  { fill: #b2f2bb; }
    .box-fill-purple { fill: #d0bfff; }
    .box-stroke      { stroke: #1e1e1e; stroke-width: 2.2; fill-opacity: 1; stroke-linejoin: round; stroke-linecap: round; }
    .arrow           { stroke: #343a40; stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Section labels -->
  <text class="platform-label" x="40" y="36">Platform engineer applies</text>
  <text class="user-label"     x="640" y="36">User applies</text>
  <text class="ext-label"      x="40" y="290">Operator-staged or workload identity</text>

  <!-- Provider (yellow / platform) -->
  <g>
    <path class="box-fill-yellow box-stroke"
          d="M 50 70 C 48 62, 56 56, 66 56 L 246 58 C 256 58, 260 66, 258 74 L 256 146 C 256 156, 248 160, 238 160 L 60 158 C 50 158, 46 150, 48 142 Z" />
    <text class="label" text-anchor="middle" x="153" y="104">Provider</text>
    <text class="muted" text-anchor="middle" x="153" y="130">(installed package)</text>
  </g>

  <!-- Arrow: Provider → Provider Pod -->
  <path class="arrow" d="M 262 108 C 296 102, 332 116, 366 108" />
  <polygon class="arrow" fill="#343a40" points="366,108 354,102 356,114" />
  <text class="muted" text-anchor="middle" x="314" y="92">spawns</text>

  <!-- Provider Pod (green / runtime) -->
  <g>
    <path class="box-fill-green box-stroke"
          d="M 372 70 C 370 62, 378 56, 388 56 L 568 58 C 578 58, 582 66, 580 74 L 578 146 C 578 156, 570 160, 560 160 L 382 158 C 372 158, 368 150, 370 142 Z" />
    <text class="label" text-anchor="middle" x="475" y="104">Provider Pod</text>
    <text class="muted" text-anchor="middle" x="475" y="130">(crossplane-system)</text>
  </g>

  <!-- Arrow: Provider Pod → External API -->
  <path class="arrow" d="M 584 108 C 620 102, 660 116, 696 108" />
  <polygon class="arrow" fill="#343a40" points="696,108 684,102 686,114" />
  <text class="muted" text-anchor="middle" x="642" y="92">calls</text>

  <!-- External API (purple) -->
  <g>
    <path class="box-fill-purple box-stroke"
          d="M 702 70 C 700 62, 710 56, 720 56 L 920 58 C 930 58, 934 66, 932 74 L 930 146 C 930 156, 922 160, 912 160 L 716 158 C 706 158, 702 150, 704 142 Z" />
    <text class="label" text-anchor="middle" x="818" y="104">External API</text>
    <text class="muted" text-anchor="middle" x="818" y="130">AWS, Helm, GitHub, …</text>
  </g>

  <!-- ProviderConfig (yellow / platform) -->
  <g>
    <path class="box-fill-yellow box-stroke"
          d="M 372 196 C 370 188, 378 182, 388 182 L 568 184 C 578 184, 582 192, 580 200 L 578 268 C 578 278, 570 282, 560 282 L 382 280 C 372 280, 368 272, 370 264 Z" />
    <text class="label" text-anchor="middle" x="475" y="222">ProviderConfig</text>
    <text class="muted" text-anchor="middle" x="475" y="250">(how to authenticate)</text>
  </g>

  <!-- Arrow: Provider Pod uses ProviderConfig (vertical, downward) -->
  <path class="arrow" d="M 470 162 C 468 174, 472 178, 470 180" />
  <polygon class="arrow" fill="#343a40" points="470,188 462,174 478,174" />
  <text class="muted" text-anchor="end" x="464" y="178">uses</text>

  <!-- Secret (purple, bottom-left) -->
  <g>
    <path class="box-fill-purple box-stroke"
          d="M 50 320 C 48 312, 56 306, 66 306 L 246 308 C 256 308, 260 316, 258 324 L 256 392 C 256 402, 248 406, 238 406 L 60 404 C 50 404, 46 396, 48 388 Z" />
    <text class="label" text-anchor="middle" x="153" y="346">Secret</text>
    <text class="muted" text-anchor="middle" x="153" y="374">(or InjectedIdentity)</text>
  </g>

  <!-- Arrow: ProviderConfig → Secret (left-pointing) -->
  <path class="arrow" d="M 366 240 C 320 244, 280 280, 260 320" />
  <polygon class="arrow" fill="#343a40" points="260,320 268,310 272,322" />
  <text class="muted" text-anchor="middle" x="320" y="296">credentials</text>

  <!-- MR (blue / user, bottom-right) -->
  <g>
    <path class="box-fill-blue box-stroke"
          d="M 702 320 C 700 312, 710 306, 720 306 L 920 308 C 930 308, 934 316, 932 324 L 930 392 C 930 402, 922 406, 912 406 L 716 404 C 706 404, 702 396, 704 388 Z" />
    <text class="label" text-anchor="middle" x="818" y="346">MR</text>
    <text class="muted" text-anchor="middle" x="818" y="374">(Bucket, Release, Repo…)</text>
  </g>

  <!-- Arrow: MR → ProviderConfig (providerConfigRef) -->
  <path class="arrow" d="M 700 350 C 650 320, 600 290, 580 280" />
  <polygon class="arrow" fill="#343a40" points="580,280 588,290 576,294" />
  <text class="muted" text-anchor="middle" x="640" y="312">providerConfigRef</text>

  <!-- Arrow: Provider Pod → watches MR (right-down) -->
  <path class="arrow" d="M 568 154 C 700 200, 800 280, 826 304" />
  <polygon class="arrow" fill="#343a40" points="826,304 814,300 820,290" />
  <text class="muted" text-anchor="middle" x="720" y="226">watches</text>

</svg>
