<?xml version="1.0" encoding="UTF-8"?>
<!-- Cheatsheet §1.3 — dark variant. See cheatsheet-crossplane-loop-light.svg for semantics. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" font-family="'Comic Sans MS', 'Segoe Print', 'Bradley Hand', cursive" font-size="18">
  <style>
    .label  { fill: #f1f3f5; }
    .muted  { fill: #ced4da; font-size: 14px; }
    .sidenote { fill: #adb5bd; font-size: 13px; font-style: italic; }
    .user-label     { fill: #74c0fc; font-size: 17px; font-style: italic; }
    .platform-label { fill: #ffd43b; font-size: 17px; font-style: italic; }
    .ext-label      { fill: #b197fc; font-size: 17px; font-style: italic; }
    .box-fill-yellow { fill: #b08900; fill-opacity: 0.55; }
    .box-fill-blue   { fill: #1971c2; fill-opacity: 0.55; }
    .box-fill-green  { fill: #2f9e44; fill-opacity: 0.55; }
    .box-fill-purple { fill: #7048e8; fill-opacity: 0.55; }
    .box-stroke      { stroke: #f8f9fa; stroke-width: 2.2; stroke-linejoin: round; stroke-linecap: round; }
    .arrow           { stroke: #dee2e6; stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .bridge          { stroke: #ffd43b; stroke-width: 2; fill: none; stroke-dasharray: 8 5; stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <text class="user-label" text-anchor="middle" x="490" y="36">What a user applies</text>

  <text class="platform-label" text-anchor="middle" x="218" y="74">compose-your-own-API</text>
  <text class="platform-label" text-anchor="middle" x="762" y="74">talk-to-external-API</text>

  <g>
    <path class="box-fill-blue box-stroke"
          d="M 108 96 C 106 88, 114 82, 124 82 L 310 84 C 320 84, 324 92, 322 100 L 320 168 C 320 178, 312 182, 302 182 L 118 180 C 108 180, 104 172, 106 164 Z" />
    <text class="label" text-anchor="middle" x="214" y="124">XR</text>
    <text class="muted" text-anchor="middle" x="214" y="148">your custom kind</text>
    <text class="muted" text-anchor="middle" x="214" y="166">(Application, Database…)</text>
  </g>

  <g>
    <path class="box-fill-blue box-stroke"
          d="M 652 96 C 650 88, 658 82, 668 82 L 854 84 C 864 84, 868 92, 866 100 L 864 168 C 864 178, 856 182, 846 182 L 662 180 C 652 180, 648 172, 650 164 Z" />
    <text class="label" text-anchor="middle" x="758" y="124">MR</text>
    <text class="muted" text-anchor="middle" x="758" y="148">a provider's kind</text>
    <text class="muted" text-anchor="middle" x="758" y="166">(Bucket, Release, Repo…)</text>
  </g>

  <text class="sidenote" text-anchor="middle" x="214" y="208">XRD defines the XR's shape</text>
  <text class="sidenote" text-anchor="middle" x="758" y="208">ProviderConfig auths the Pod</text>

  <path class="arrow" d="M 214 188 C 212 220, 216 240, 214 256" />
  <polygon class="arrow" fill="#dee2e6" points="214,264 206,250 222,250" />
  <text class="muted" text-anchor="middle" x="262" y="232">triggers</text>

  <path class="arrow" d="M 758 188 C 756 220, 760 240, 758 256" />
  <polygon class="arrow" fill="#dee2e6" points="758,264 750,250 766,250" />
  <text class="muted" text-anchor="middle" x="816" y="232">watched by</text>

  <g>
    <path class="box-fill-yellow box-stroke"
          d="M 108 274 C 106 266, 114 260, 124 260 L 310 262 C 320 262, 324 270, 322 278 L 320 346 C 320 356, 312 360, 302 360 L 118 358 C 108 358, 104 350, 106 342 Z" />
    <text class="label" text-anchor="middle" x="214" y="298">Composition pipeline</text>
    <text class="muted" text-anchor="middle" x="214" y="324">+ function</text>
    <text class="muted" text-anchor="middle" x="214" y="344">(patch-and-transform, …)</text>
  </g>

  <g>
    <path class="box-fill-green box-stroke"
          d="M 652 274 C 650 266, 658 260, 668 260 L 854 262 C 864 262, 868 270, 866 278 L 864 346 C 864 356, 856 360, 846 360 L 662 358 C 652 358, 648 350, 650 342 Z" />
    <text class="label" text-anchor="middle" x="758" y="304">Provider Pod</text>
    <text class="muted" text-anchor="middle" x="758" y="332">(reconciles MRs by</text>
    <text class="muted" text-anchor="middle" x="758" y="350">calling the external API)</text>
  </g>

  <path class="arrow" d="M 184 366 C 182 400, 186 420, 184 436" />
  <polygon class="arrow" fill="#dee2e6" points="184,444 176,430 192,430" />
  <text class="muted" text-anchor="end" x="178" y="412">emits</text>

  <path class="arrow" d="M 758 366 C 756 400, 760 420, 758 436" />
  <polygon class="arrow" fill="#dee2e6" points="758,444 750,430 766,430" />
  <text class="muted" text-anchor="middle" x="810" y="412">calls</text>

  <g>
    <path class="box-fill-green box-stroke"
          d="M 108 452 C 106 444, 114 438, 124 438 L 310 440 C 320 440, 324 448, 322 456 L 320 524 C 320 534, 312 538, 302 538 L 118 536 C 108 536, 104 528, 106 520 Z" />
    <text class="label" text-anchor="middle" x="214" y="480">Native cluster resources</text>
    <text class="muted" text-anchor="middle" x="214" y="506">ConfigMap, Deployment,</text>
    <text class="muted" text-anchor="middle" x="214" y="524">Service, Job, …</text>
  </g>

  <g>
    <path class="box-fill-purple box-stroke"
          d="M 652 452 C 650 444, 658 438, 668 438 L 854 440 C 864 440, 868 448, 866 456 L 864 524 C 864 534, 856 538, 846 538 L 662 536 C 652 536, 648 528, 650 520 Z" />
    <text class="label" text-anchor="middle" x="758" y="480">External API</text>
    <text class="muted" text-anchor="middle" x="758" y="506">AWS, GCP, Azure,</text>
    <text class="muted" text-anchor="middle" x="758" y="524">GitHub, Helm, …</text>
  </g>

  <path class="bridge" d="M 322 320 C 440 320, 540 320, 650 320" />
  <polygon fill="#ffd43b" points="650,320 638,314 640,326" />
  <text class="sidenote" text-anchor="middle" x="486" y="312">Compositions can also emit MRs (bridges both halves)</text>

</svg>
