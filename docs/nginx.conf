server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/x-javascript text/xml application/xml
               application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Reverse-proxy /api/* to the validator sidecar running on 127.0.0.1:8081.
    # The two containers share a network namespace (same pod), so localhost works.
    location /api/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # SPA fallback: unknown paths serve index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
