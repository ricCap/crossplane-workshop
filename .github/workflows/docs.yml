name: Build and push docs image

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Cap the arm64 cross-build. Docusaurus + webpack under QEMU has hung
    # for >4h in the past; fail fast instead of burning runner minutes.
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU enables linux/arm64 cross-builds on the amd64 runner. The
      # workshop's local vind cluster runs on Apple-silicon macs, and
      # ArubaCloud nodes are typically amd64 — we publish both so the
      # same manifest list works in either environment.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docs
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/riccap/crossplane-workshop-docs:latest
            ghcr.io/riccap/crossplane-workshop-docs:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
