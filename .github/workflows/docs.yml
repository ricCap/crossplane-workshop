name: Build and push docs image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/riccap/crossplane-workshop-docs

# Two native per-platform builds run in parallel, each pushing by digest to
# GHCR. A third job then stitches the digests into a multi-arch manifest list
# tagged `:latest` and `:sha-<commit>`. This avoids QEMU emulation entirely —
# the arm64 build used to hang for >4h under QEMU on the amd64 runner.
#
# Pattern: https://docs.docker.com/build/ci/github-actions/multi-platform/#distribute-build-across-multiple-runners
#
# Note: `ubuntu-24.04-arm` is a free native arm64 runner for public GitHub
# repos. If this repo ever goes private, add an Actions billing review here.
jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: docs
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docs-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=docs-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: docs-digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: docs-digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # On a branch push to main: retag :latest (so the solo path keeps tracking
      # main) and :sha-<commit>. On a tag push (vX.Y.Z): tag :vX.Y.Z and
      # :sha-<commit>, but DO NOT touch :latest — Aruba runs off the pinned
      # tag, the solo path off :latest, and the two must move independently.
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            docker buildx imagetools create \
              -t ${{ env.IMAGE }}:${{ github.ref_name }} \
              -t ${{ env.IMAGE }}:sha-${{ github.sha }} \
              $(printf '${{ env.IMAGE }}@sha256:%s ' *)
          else
            docker buildx imagetools create \
              -t ${{ env.IMAGE }}:latest \
              -t ${{ env.IMAGE }}:sha-${{ github.sha }} \
              $(printf '${{ env.IMAGE }}@sha256:%s ' *)
          fi

      - name: Inspect image
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            docker buildx imagetools inspect ${{ env.IMAGE }}:${{ github.ref_name }}
          else
            docker buildx imagetools inspect ${{ env.IMAGE }}:latest
          fi
