name: i18n sync

# Gate every PR (and pushes to main) on the invariant: every English doc
# under docs/docs/ has a matching translation whose
# `translation_source_commit` frontmatter equals the latest commit touching
# the English source. See AGENTS.md §Localization for the full workflow.
#
# The check is a dependency-free Node script — no `npm ci`, no API keys.
# `fetch-depth: 0` is required so `git log` can resolve the latest commit
# touching each file.

on:
  push:
    branches:
      - main
    paths:
      - 'docs/docs/**'
      - 'docs/i18n/**'
      - 'docs/scripts/check-i18n-sync.js'
      - '.github/workflows/i18n-sync.yml'
  pull_request:
    paths:
      - 'docs/docs/**'
      - 'docs/i18n/**'
      - 'docs/scripts/check-i18n-sync.js'
      - '.github/workflows/i18n-sync.yml'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run i18n sync check
        run: node docs/scripts/check-i18n-sync.js
