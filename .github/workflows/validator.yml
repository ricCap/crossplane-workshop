name: Build and push validator image

on:
  push:
    branches:
      - main
    paths:
      - 'validator/**'
      - '.github/workflows/validator.yml'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: validator
          push: true
          tags: |
            ghcr.io/riccap/crossplane-workshop-validator:latest
            ghcr.io/riccap/crossplane-workshop-validator:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
