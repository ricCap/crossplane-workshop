version: '3'

# Every workshop operation lives here. See AGENTS.md and PLAN.md.
#
# Phase 1 (local vind):   task local:all
#                         task verify:pair PAIR=fancy-lemon            # operator path
# Phase 2 (ArubaCloud):   task bootstrap:all && task remote:register-vcluster-cloud
#                         task verify:pair:platform PAIR=fancy-lemon   # participant path

vars:
  CLUSTER_NAME: crossplane-workshop
  # Solo local (k3d) — separate name so it can coexist with a vind
  # cluster on the same Docker daemon.
  SOLO_CLUSTER_NAME: crossplane-workshop-solo
  ARGOCD_NS: argocd
  # argo/argo-cd — ArgoCD 3.3.6 app version. Bump deliberately.
  # https://github.com/argoproj/argo-helm/releases/tag/argo-cd-9.5.0
  ARGOCD_CHART_VERSION: 9.5.0
  ROOT_APP: bootstrap/root-app.yaml
  ARGOCD_VALUES: bootstrap/argocd-values.yaml
  # GitHub repo this cluster pulls from. Override these three to reuse the
  # Taskfile against a fork.
  GITHUB_REPO: ricCap/crossplane-workshop
  REPO_SSH_URL: git@github.com:ricCap/crossplane-workshop.git
  DEPLOY_KEY_TITLE: argocd-crossplane-workshop
  ARGOCD_REPO_SECRET: repo-crossplane-workshop
  # Envoy Gateway — Gateway API-native controller. Installed via OCI
  # Helm chart (not ArgoCD-managed — Docker Hub rate limits block
  # unauthenticated OCI pulls from cluster IPs).
  # https://gateway.envoyproxy.io/docs/install/install-helm/
  ENVOY_GATEWAY_VERSION: v1.4.0
  ENVOY_GATEWAY_NS: envoy-gateway-system
  # vCluster Platform — web UI for participant vcluster access.
  # Installed via `task bootstrap:vcluster-platform` (not ArgoCD)
  # to keep admin credentials out of git.
  VCLUSTER_PLATFORM_VERSION: 4.8.0
  VCLUSTER_PLATFORM_NS: vcluster-platform
  # GHCR pull secret for the private docs + validator images. The secret
  # is created in the `docs` namespace and referenced via imagePullSecrets
  # in gitops/docs/deployment.yaml.
  DOCS_NS: docs
  GHCR_PULL_SECRET: ghcr-pull

tasks:

  default:
    desc: List available tasks.
    cmds:
      - task --list
    silent: true

  # ------------------------------------------------------------------
  # Phase 1 — local (vind = vcluster CLI with Docker driver, aka
  # "vCluster in Docker" — see https://github.com/loft-sh/vind).
  # Requires vcluster CLI >= 0.31.0 and a running Docker daemon.
  # ------------------------------------------------------------------

  local:up:
    desc: "Create the local vind cluster (vcluster create with Docker driver)."
    cmds:
      - vcluster use driver docker
      - vcluster create {{.CLUSTER_NAME}}
      - kubectl cluster-info

  local:down:
    desc: Delete the local vind cluster.
    cmds:
      - vcluster delete {{.CLUSTER_NAME}}

  local:all:
    desc: "Phase 1 one-shot: local cluster up + bootstrap ArgoCD + apply root app."
    cmds:
      - task: local:up
      - task: bootstrap:all

  # ------------------------------------------------------------------
  # Solo local (k3d) — a laptop-only path that reuses the docs image
  # and Envoy Gateway but skips ArgoCD, vcluster, and the per-pair
  # scaffolding. `gitops/solo/` is the source of truth; all.yaml is
  # the pre-rendered bundle that the public docs page links to.
  # See docs/docs/05-solo-local-setup.mdx.
  # ------------------------------------------------------------------

  solo:up:
    desc: "Create the solo k3d cluster with host port 8080 mapped to the load balancer."
    # `--disable=traefik` prevents k3s's bundled traefik ingress controller from
    # claiming the cluster LB. Envoy Gateway's `eg` GatewayClass is what the
    # workshop manifests target, and two controllers fighting for port 80 ends
    # with curl getting traefik's 404 page instead of our docs.
    cmds:
      - k3d cluster create {{.SOLO_CLUSTER_NAME}} -p "8080:80@loadbalancer" --k3s-arg "--disable=traefik@server:0"
      - kubectl cluster-info

  solo:down:
    desc: "Delete the solo k3d cluster."
    cmds:
      - k3d cluster delete {{.SOLO_CLUSTER_NAME}}

  solo:platform:
    desc: "Install Envoy Gateway and apply gitops/solo against the current kube context."
    cmds:
      - |
        helm upgrade --install eg oci://docker.io/envoyproxy/gateway-helm \
          --version {{.ENVOY_GATEWAY_VERSION}} \
          --namespace {{.ENVOY_GATEWAY_NS}} --create-namespace \
          --wait
      - kubectl apply -k gitops/solo

  solo:render:
    desc: "Regenerate gitops/solo/all.yaml from the kustomize overlay."
    cmds:
      - kubectl kustomize gitops/solo > gitops/solo/all.yaml

  solo:all:
    desc: "Solo one-shot: create the k3d cluster and install Envoy Gateway + docs + gateway."
    cmds:
      - task: solo:up
      - task: solo:platform

  solo:verify:
    desc: "Smoke check the solo stack: Envoy Gateway ready, docs pod ready, / and /api/pairs respond."
    cmds:
      - kubectl -n {{.ENVOY_GATEWAY_NS}} wait --for=condition=Available deploy -l app.kubernetes.io/name=gateway-helm --timeout=180s
      - kubectl -n {{.DOCS_NS}} wait --for=condition=Available deploy/docs --timeout=180s
      - 'curl -sf http://localhost:8080/ -o /dev/null && echo "  / ok"'
      - 'curl -sf http://localhost:8080/api/pairs | grep -q ''"local"'' && echo "  /api/pairs returns [local]"'

  # ------------------------------------------------------------------
  # Dev — run the docs + validator locally against the current
  # KUBECONFIG. No participant-* namespaces needed; the validator
  # reports a single synthetic "local" pair and runs every check
  # against the active cluster. Run in two separate shells:
  #     task dev:validator   # :8081, VALIDATOR_LOCAL=1
  #     task dev:docs        # :3000, proxies /api/* to :8081
  # Then open http://localhost:3000/dashboard.
  # ------------------------------------------------------------------

  dev:validator:
    desc: "Run the validator against the current KUBECONFIG on :8081 (local mode)."
    dir: validator
    env:
      VALIDATOR_LOCAL: '1'
    cmds:
      - go run .

  dev:docs:
    desc: "Run the Docusaurus dev server on :3000 with /api/* proxied to the local validator."
    dir: docs
    cmds:
      - '[ -d node_modules ] || npm ci'
      - npm run start

  # ------------------------------------------------------------------
  # Localization (i18n)
  #
  # English under docs/docs/ is the source of truth. Each translated
  # file under docs/i18n/<locale>/docusaurus-plugin-content-docs/current/
  # carries `translation_source_commit: <SHA>` in its frontmatter — the
  # commit SHA of the English file at translation time. The CI workflow
  # `.github/workflows/i18n-sync.yml` runs `docs:i18n:check` on every
  # PR. See AGENTS.md §Localization for the full workflow.
  # ------------------------------------------------------------------

  docs:i18n:check:
    desc: "Verify every English doc has an in-sync translation in every locale."
    cmds:
      - node docs/scripts/check-i18n-sync.js

  docs:i18n:diff:
    desc: |
      Print the English `git diff` for every out-of-sync translation
      (or just one, if FILE=docs/docs/<path> is given). Use this to see
      what changed in English since the last translation.
    cmds:
      - node docs/scripts/check-i18n-sync.js --diff {{if .FILE}}FILE={{.FILE}}{{end}}

  docs:i18n:bump:
    desc: |
      Mark a translation as up-to-date with English. Rewrites
      `translation_source_commit` in the locale file(s) for FILE to the
      latest commit touching docs/docs/<FILE>. Run after you've applied
      the diff to the translation. Requires FILE=docs/docs/<path>.
    preconditions:
      - sh: '[ -n "{{.FILE}}" ]'
        msg: "FILE=docs/docs/<path> is required"
    cmds:
      - node docs/scripts/check-i18n-sync.js --bump FILE={{.FILE}}

  # ------------------------------------------------------------------
  # Bootstrap (shared by Phase 1 and Phase 2)
  # ------------------------------------------------------------------

  bootstrap:argocd:
    desc: Install ArgoCD via Helm into the current KUBECONFIG context.
    # Multiple downstream tasks declare this as a dep; without `run: once`
    # task would invoke `helm upgrade` in parallel and race itself.
    run: once
    cmds:
      - helm repo add argo https://argoproj.github.io/argo-helm
      - helm repo update argo
      - |
        helm upgrade --install argo-cd argo/argo-cd \
          --namespace {{.ARGOCD_NS}} --create-namespace \
          --version {{.ARGOCD_CHART_VERSION}} \
          --values {{.ARGOCD_VALUES}} \
          --wait

  bootstrap:repo-credentials:
    desc: |
      Provision a GitHub read-only deploy key for this repo and wire it into
      ArgoCD as a repo Secret. Idempotent — re-runs rotate the key.
      Requires `gh` installed and authenticated (`gh auth login`).
    deps: [bootstrap:argocd]
    cmds:
      - |
        set -euo pipefail

        command -v gh >/dev/null 2>&1 || { echo "gh CLI not found — install with 'brew install gh'"; exit 1; }
        gh auth status >/dev/null 2>&1 || { echo "gh not authenticated — run 'gh auth login'"; exit 1; }

        # Idempotency: rotate any prior deploy key with the same title.
        existing=$(gh repo deploy-key list --repo {{.GITHUB_REPO}} --json id,title --jq '.[] | select(.title=="{{.DEPLOY_KEY_TITLE}}") | .id' || true)
        if [ -n "${existing}" ]; then
          echo "Removing existing deploy key '{{.DEPLOY_KEY_TITLE}}' (id=${existing})"
          gh repo deploy-key delete "${existing}" --repo {{.GITHUB_REPO}}
        fi

        # Fresh ed25519 keypair in a temp dir that we always clean up.
        TMPDIR=$(mktemp -d -t crossplane-workshop-deploy-XXXXXX)
        trap 'rm -rf "${TMPDIR}"' EXIT
        ssh-keygen -t ed25519 -N "" -f "${TMPDIR}/key" -C "{{.DEPLOY_KEY_TITLE}}@{{.GITHUB_REPO}}" -q

        # Register the public half as a read-only deploy key.
        gh repo deploy-key add "${TMPDIR}/key.pub" --title "{{.DEPLOY_KEY_TITLE}}" --repo {{.GITHUB_REPO}}

        # Build and apply the ArgoCD repo Secret. base64 avoids multi-line
        # heredoc indentation issues for the private key.
        KEY_B64=$(base64 < "${TMPDIR}/key" | tr -d '\n')
        URL_B64=$(printf %s '{{.REPO_SSH_URL}}' | base64 | tr -d '\n')
        TYPE_B64=$(printf %s 'git' | base64 | tr -d '\n')

        cat <<YAML | kubectl apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: {{.ARGOCD_REPO_SECRET}}
          namespace: {{.ARGOCD_NS}}
          labels:
            argocd.argoproj.io/secret-type: repository
        type: Opaque
        data:
          type: ${TYPE_B64}
          url: ${URL_B64}
          sshPrivateKey: ${KEY_B64}
        YAML

        echo "repo credentials provisioned for {{.REPO_SSH_URL}}"

  bootstrap:repo-credentials-aruba:
    desc: |
      Same as bootstrap:repo-credentials but uses a distinct deploy-key
      title (`argocd-crossplane-workshop-aruba`) so local (vind) runs
      don't rotate the key the ArubaCloud cluster relies on. Run this
      once against the Aruba kubeconfig; the idempotent local task can
      keep rotating its own key freely.
    deps: [bootstrap:argocd]
    vars:
      DEPLOY_KEY_TITLE: argocd-crossplane-workshop-aruba
    cmds:
      - |
        set -euo pipefail

        command -v gh >/dev/null 2>&1 || { echo "gh CLI not found — install with 'brew install gh'"; exit 1; }
        gh auth status >/dev/null 2>&1 || { echo "gh not authenticated — run 'gh auth login'"; exit 1; }

        existing=$(gh repo deploy-key list --repo {{.GITHUB_REPO}} --json id,title --jq '.[] | select(.title=="{{.DEPLOY_KEY_TITLE}}") | .id' || true)
        if [ -n "${existing}" ]; then
          echo "Removing existing deploy key '{{.DEPLOY_KEY_TITLE}}' (id=${existing})"
          gh repo deploy-key delete "${existing}" --repo {{.GITHUB_REPO}}
        fi

        TMPDIR=$(mktemp -d -t crossplane-workshop-aruba-deploy-XXXXXX)
        trap 'rm -rf "${TMPDIR}"' EXIT
        ssh-keygen -t ed25519 -N "" -f "${TMPDIR}/key" -C "{{.DEPLOY_KEY_TITLE}}@{{.GITHUB_REPO}}" -q

        gh repo deploy-key add "${TMPDIR}/key.pub" --title "{{.DEPLOY_KEY_TITLE}}" --repo {{.GITHUB_REPO}}

        KEY_B64=$(base64 < "${TMPDIR}/key" | tr -d '\n')
        URL_B64=$(printf %s '{{.REPO_SSH_URL}}' | base64 | tr -d '\n')
        TYPE_B64=$(printf %s 'git' | base64 | tr -d '\n')

        cat <<YAML | kubectl apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: {{.ARGOCD_REPO_SECRET}}
          namespace: {{.ARGOCD_NS}}
          labels:
            argocd.argoproj.io/secret-type: repository
        type: Opaque
        data:
          type: ${TYPE_B64}
          url: ${URL_B64}
          sshPrivateKey: ${KEY_B64}
        YAML

        echo "aruba repo credentials provisioned for {{.REPO_SSH_URL}}"

  bootstrap:ghcr-pull-secret:
    desc: |
      Provision a dockerconfigjson Secret in the docs namespace so the
      docs Deployment can pull the private ghcr.io/<owner>/crossplane-
      workshop-{docs,validator} images. Uses the token from `gh auth
      token`, so the gh CLI must have the `read:packages` scope:

        gh auth refresh -h github.com -s read:packages

      Idempotent — re-runs overwrite the Secret with the current token.
    cmds:
      - |
        set -euo pipefail

        command -v gh >/dev/null 2>&1 || { echo "gh CLI not found — install with 'brew install gh'"; exit 1; }
        gh auth status >/dev/null 2>&1 || { echo "gh not authenticated — run 'gh auth login'"; exit 1; }

        # Verify the current gh token carries read:packages; otherwise the
        # secret we build would fail at image-pull time with a confusing 403.
        if ! gh auth status 2>&1 | grep -q 'read:packages'; then
          echo "gh token is missing the 'read:packages' scope." >&2
          echo "Run: gh auth refresh -h github.com -s read:packages" >&2
          exit 1
        fi

        GH_USER=$(gh api user -q '.login')
        GH_TOKEN=$(gh auth token)

        # Ensure the target namespace exists. ArgoCD will later adopt it
        # via the docs Application's CreateNamespace=true syncOption.
        kubectl get ns {{.DOCS_NS}} >/dev/null 2>&1 || kubectl create ns {{.DOCS_NS}}

        kubectl -n {{.DOCS_NS}} create secret docker-registry {{.GHCR_PULL_SECRET}} \
          --docker-server=ghcr.io \
          --docker-username="${GH_USER}" \
          --docker-password="${GH_TOKEN}" \
          --dry-run=client -o yaml | kubectl apply -f -

        echo "ghcr pull secret provisioned in namespace {{.DOCS_NS}}"

  bootstrap:aruba-cloud-credentials:
    desc: |
      Install the shared Aruba Cloud API key as a Secret on the
      management cluster. The XDeveloperEnvironment Composition's
      vcluster Helm Release projects this Secret into every per-pair
      vcluster's `aruba-system` namespace via `sync.fromHost.secrets`,
      so the participant-side Aruba provider (installed by the
      ApplicationSet bundle, see #44 / Track 2) reads a single shared
      key. Workshop owner runs this once at workshop setup; rotation =
      re-run.

      Distinct from `bootstrap:repo-credentials-aruba` — that task
      manages the GitHub deploy key that the Aruba-hosted ArgoCD uses
      to pull this repo. THIS task manages the Aruba *cloud* API key
      that the upjet-based provider uses to provision DBaaS / VPCs /
      etc. Two completely different credentials.

      Set ARUBA_API_KEY + ARUBA_API_SECRET env vars, or be prompted
      interactively. Idempotent — re-running upserts the Secret.
    run: once
    cmds:
      - |
        set -euo pipefail

        if [ -z "${ARUBA_API_KEY:-}" ]; then
          read -s -p "ARUBA_API_KEY: " ARUBA_API_KEY
          echo
        fi
        if [ -z "${ARUBA_API_SECRET:-}" ]; then
          read -s -p "ARUBA_API_SECRET: " ARUBA_API_SECRET
          echo
        fi

        [ -n "${ARUBA_API_KEY}" ]    || { echo "ARUBA_API_KEY cannot be empty"; exit 1; }
        [ -n "${ARUBA_API_SECRET}" ] || { echo "ARUBA_API_SECRET cannot be empty"; exit 1; }

        # provider-arubacloud expects the credentials Secret to hold a
        # `credentials` key whose value is a JSON object with `api_key`
        # and `api_secret` (matches the underlying Terraform provider's
        # provider-block schema; see provider-arubacloud#6).
        kubectl create namespace crossplane-system 2>/dev/null || true
        kubectl create secret generic aruba-creds \
          --namespace crossplane-system \
          --from-literal=credentials="$(printf '{"api_key":"%s","api_secret":"%s"}' "${ARUBA_API_KEY}" "${ARUBA_API_SECRET}")" \
          --dry-run=client -o yaml | kubectl apply -f -

        echo "aruba-creds Secret provisioned in crossplane-system on management cluster"
        echo "(per-pair vclusters pick it up automatically via sync.fromHost.secrets once their Aruba bundle is synced)"

  bootstrap:envoy-gateway:
    desc: Install Envoy Gateway (Gateway API controller) via OCI Helm chart.
    run: once
    cmds:
      - |
        helm upgrade --install eg oci://docker.io/envoyproxy/gateway-helm \
          --version {{.ENVOY_GATEWAY_VERSION}} \
          --namespace {{.ENVOY_GATEWAY_NS}} --create-namespace \
          --wait

  bootstrap:vcluster-platform:
    desc: |
      Install vCluster Platform via Helm. Keeps admin password out of git.
      Set PLATFORM_ADMIN_PASSWORD env var or be prompted interactively.
    run: once
    cmds:
      - |
        set -euo pipefail

        if [ -z "${PLATFORM_ADMIN_PASSWORD:-}" ]; then
          echo "Set PLATFORM_ADMIN_PASSWORD or enter it now:"
          read -s -p "Admin password: " PLATFORM_ADMIN_PASSWORD
          echo
        fi

        [ -n "${PLATFORM_ADMIN_PASSWORD}" ] || { echo "Password cannot be empty"; exit 1; }

        helm repo add loft https://charts.loft.sh 2>/dev/null || true
        helm repo update loft

        helm upgrade --install vcluster-platform loft/vcluster-platform \
          --version {{.VCLUSTER_PLATFORM_VERSION}} \
          --namespace {{.VCLUSTER_PLATFORM_NS}} --create-namespace \
          --set admin.create=true \
          --set admin.username=admin \
          --set "admin.password=${PLATFORM_ADMIN_PASSWORD}" \
          --set ingress.enabled=false \
          --set config.loftHost=platform-crossplane.workshops.riccardocapraro.it \
          --set config.monitoring.enabled=false \
          --set replicaCount=1 \
          --set "resources.requests.cpu=200m" \
          --set "resources.requests.memory=512Mi" \
          --set "resources.limits.cpu=1" \
          --set "resources.limits.memory=2Gi" \
          --wait --timeout 5m

        echo "vCluster Platform installed. UI: https://platform-crossplane.workshops.riccardocapraro.it"

  bootstrap:root-app:
    desc: Apply the root app-of-apps Application.
    deps: [bootstrap:argocd, bootstrap:repo-credentials, bootstrap:ghcr-pull-secret]
    cmds:
      - kubectl apply -f {{.ROOT_APP}}

  bootstrap:all:
    desc: Install ArgoCD, wire repo + ghcr credentials, Envoy Gateway, vCluster Platform, and apply the root app-of-apps.
    cmds:
      - task: bootstrap:argocd
      - task: bootstrap:repo-credentials
      - task: bootstrap:ghcr-pull-secret
      - task: bootstrap:envoy-gateway
      - task: bootstrap:vcluster-platform
      - task: bootstrap:root-app

  # ------------------------------------------------------------------
  # ArgoCD UI
  # ------------------------------------------------------------------

  argocd:ui:
    desc: "Port-forward the ArgoCD UI to https://localhost:8080."
    cmds:
      - |
        echo "ArgoCD UI: https://localhost:8080"
        echo "Username:  admin"
        echo "Password:  $(kubectl -n {{.ARGOCD_NS}} get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d)"
        kubectl -n {{.ARGOCD_NS}} port-forward svc/argo-cd-argocd-server 8080:443

  crossplane:ui:
    desc: "Port-forward the UXP Web UI to http://localhost:8200/ (read-only Crossplane dashboard)."
    cmds:
      - |
        echo "UXP Web UI: http://localhost:8200"
        kubectl -n crossplane-system port-forward svc/webui 8200:80

  wall:ui:
    desc: "Port-forward the Envoy Gateway to https://localhost:8443/ (docs + /wall + every /team/<pair>/ tile)."
    cmds:
      - |
        SVC=$(kubectl get svc -n envoy-gateway-system -l gateway.envoyproxy.io/owning-gateway-name=workshop -o jsonpath='{.items[0].metadata.name}')
        echo "Docs:  https://localhost:8443/"
        echo "Wall:  https://localhost:8443/wall"
        echo "Forwarding via service: $SVC"
        kubectl -n envoy-gateway-system port-forward "svc/$SVC" 8443:443

  vcluster:connect:
    desc: |
      Connect to a participant vcluster (Helm-driver) and switch the
      active kube-context. Exits when you `vcluster disconnect`.
      Usage: task vcluster:connect PAIR=fancy-lemon
    requires:
      vars: [PAIR]
    cmds:
      - vcluster connect {{.PAIR}} -n participant-{{.PAIR}} --driver helm

  # ------------------------------------------------------------------
  # vCluster Platform
  # ------------------------------------------------------------------

  platform:ui:
    desc: |
      Port-forward the vCluster Platform (Loft) UI to https://localhost:9898/.
      Login as admin; password is in
        helm get values vcluster-platform -n vcluster-platform | yq .admin.password
      (or the value of PLATFORM_ADMIN_PASSWORD when bootstrap:vcluster-platform was run).
    cmds:
      - |
        echo "Platform UI: https://localhost:9898"
        echo "Username:    admin"
        kubectl -n {{.VCLUSTER_PLATFORM_NS}} port-forward svc/loft 9898:443

  platform:register-vclusters:
    desc: |
      Install the `vcluster-platform-api-key` Secret in every
      `participant-*` namespace so each per-pair vcluster syncer can
      phone home to vCluster Platform. Without this Secret, the
      `VirtualClusterInstance` composed by the XDeveloperEnvironment
      Composition stays in `phase: Pending` with
      `Condition SpaceSynced is missing`. Idempotent.

      This task does NOT call `vcluster platform add vcluster`. The
      XDeveloperEnvironment Composition already creates one VCI per
      pair (project `default`, `external: true`) via
      provider-kubernetes, so Platform-side registration is
      GitOps-managed. This task only handles the syncer-side
      credential the chart mounts at `/var/vcluster/platform`.

      Required env vars:
        PLATFORM_ACCESS_KEY     Platform API access key. Generate it
                                in the Platform UI: Profile → Access
                                Keys → Create. Treat as a secret.

      Optional env vars (sensible defaults):
        PLATFORM_HOST           https://platform-crossplane.workshops.riccardocapraro.it
        PLATFORM_PROJECT        default
        PLATFORM_INSECURE       false (set to true for self-signed
                                Platform — e.g. local vind without LE)

      Secret schema per loft-sh/vcluster v0.33.1
      `pkg/platform/secret.go` :: `ApplyPlatformSecret` — required
      keys are `accessKey`, `host`, `project`, `insecure`, with the
      `vcluster.loft.sh/created-by-cli` marker label.

      Usage:
        PLATFORM_ACCESS_KEY=<key> task platform:register-vclusters
    vars:
      PLATFORM_HOST: '{{.PLATFORM_HOST | default "https://platform-crossplane.workshops.riccardocapraro.it"}}'
      PLATFORM_PROJECT: '{{.PLATFORM_PROJECT | default "default"}}'
      PLATFORM_INSECURE: '{{.PLATFORM_INSECURE | default "false"}}'
    cmds:
      - |
        set -euo pipefail
        [ -n "${PLATFORM_ACCESS_KEY:-}" ] || {
          echo "PLATFORM_ACCESS_KEY env var required." >&2
          echo "Generate one in the Platform UI: {{.PLATFORM_HOST}} → Profile → Access Keys → Create." >&2
          exit 1
        }

        # Validate the access key by logging in. Also caches the
        # login for any downstream `vcluster platform connect` /
        # `verify:pair:platform` calls.
        if [ "{{.PLATFORM_INSECURE}}" = "true" ]; then
          vcluster platform login "{{.PLATFORM_HOST}}" --access-key "${PLATFORM_ACCESS_KEY}" --insecure >/dev/null
        else
          vcluster platform login "{{.PLATFORM_HOST}}" --access-key "${PLATFORM_ACCESS_KEY}" >/dev/null
        fi

        # Discover participant namespaces and install/refresh the
        # Secret in each. Existing pods don't auto-pick-up Secret
        # changes — we restart the StatefulSet at the end so the
        # syncer picks up the credential without a manual nudge.
        pairs=$(kubectl get ns -o name | sed 's|namespace/||' | grep '^participant-' || true)
        [ -n "$pairs" ] || {
          echo "No participant-* namespaces found. Either no XDeveloperEnvironment XRs are reconciled yet, or you're on the wrong cluster." >&2
          exit 1
        }

        n=0
        for ns in $pairs; do
          kubectl -n "$ns" create secret generic vcluster-platform-api-key \
            --from-literal=accessKey="${PLATFORM_ACCESS_KEY}" \
            --from-literal=host="{{.PLATFORM_HOST}}" \
            --from-literal=project="{{.PLATFORM_PROJECT}}" \
            --from-literal=insecure="{{.PLATFORM_INSECURE}}" \
            --dry-run=client -o yaml \
            | kubectl apply -f - >/dev/null
          kubectl -n "$ns" label secret vcluster-platform-api-key \
            vcluster.loft.sh/created-by-cli=true --overwrite >/dev/null
          # Restart the syncer so it remounts the (now-populated)
          # platform-api-key volume. The Helm Release's StatefulSet
          # is named after the pair, which equals "$ns" with the
          # "participant-" prefix stripped.
          pair="${ns#participant-}"
          kubectl -n "$ns" rollout restart "statefulset/${pair}" >/dev/null 2>&1 || true
          echo "  ok: $ns"
          n=$((n + 1))
        done

        echo "Done. ${n} Secret(s) installed and syncer(s) restarted."
        echo "VCIs in p-default should reach Ready within ~30s."

  github:register:
    desc: |
      Install the `github-app-credentials` Secret in every
      `participant-*` namespace on the management cluster. The
      XDeveloperEnvironment Composition wires `sync.fromHost.secrets`
      on each pair's vCluster so this Secret is mirrored into the
      pair's `crossplane-system` namespace, where the participant's
      `provider-github` ProviderConfig reads it. Idempotent.

      The credential is the GitHub App installed on
      https://github.com/riccap-demo-org. Permissions are tightened
      (no `delete_repo`, no `admin:org`) so a misbehaving pair cannot
      blow up the shared sandbox; per-pair scoping is enforced by the
      `pair-<id>-*` repo naming convention in the workshop module.

      Required env vars:
        GITHUB_APP_ID                Numeric App ID from the GitHub App
                                     settings page.
        GITHUB_APP_INSTALLATION_ID   Numeric installation ID for the App
                                     on riccap-demo-org. Find it under
                                     the App's "Installations" tab or in
                                     the URL path /installations/<id>.
        GITHUB_APP_PEM_FILE          Path to the App's private key (.pem
                                     file generated when the App was
                                     created). Never commit this file.

      Optional env vars:
        GITHUB_OWNER                 GitHub org the App is installed on.
                                     Default: riccap-demo-org.

      Secret shape per upbound provider-github docs (single `credentials`
      key holding a JSON blob, PEM newlines escaped as \n):
        {"app_auth":[{"id":"<id>","installation_id":"<id>","pem_file":"<pem-with-\\n>"}],
         "owner":"<org>"}

      Usage:
        GITHUB_APP_ID=<id> \
        GITHUB_APP_INSTALLATION_ID=<id> \
        GITHUB_APP_PEM_FILE=/path/to/app.pem \
          task github:register

      Re-running is safe: the Secret is replaced in place. Affected
      pair vCluster syncers pick up the change on their next reconcile
      (no restart required — vcluster's fromHost sync watches the host
      Secret).
    vars:
      GITHUB_OWNER: '{{.GITHUB_OWNER | default "riccap-demo-org"}}'
    cmds:
      - |
        set -euo pipefail
        [ -n "${GITHUB_APP_ID:-}" ] || {
          echo "GITHUB_APP_ID env var required." >&2
          exit 1
        }
        [ -n "${GITHUB_APP_INSTALLATION_ID:-}" ] || {
          echo "GITHUB_APP_INSTALLATION_ID env var required." >&2
          exit 1
        }
        [ -n "${GITHUB_APP_PEM_FILE:-}" ] || {
          echo "GITHUB_APP_PEM_FILE env var required (path to .pem)." >&2
          exit 1
        }
        [ -r "${GITHUB_APP_PEM_FILE}" ] || {
          echo "GITHUB_APP_PEM_FILE not readable: ${GITHUB_APP_PEM_FILE}" >&2
          exit 1
        }

        pairs=$(kubectl get ns -o name | sed 's|namespace/||' | grep '^participant-' || true)
        [ -n "$pairs" ] || {
          echo "No participant-* namespaces found. Either no XDeveloperEnvironment XRs are reconciled yet, or you're on the wrong cluster." >&2
          exit 1
        }

        # Build the JSON blob the upbound provider-github expects.
        # PEM must be a non-multiline string with literal \n separators.
        pem_escaped=$(awk '{printf "%s\\n", $0}' "${GITHUB_APP_PEM_FILE}")
        credentials=$(printf '{"app_auth":[{"id":"%s","installation_id":"%s","pem_file":"%s"}],"owner":"%s"}' \
          "${GITHUB_APP_ID}" "${GITHUB_APP_INSTALLATION_ID}" "${pem_escaped}" "{{.GITHUB_OWNER}}")

        n=0
        for ns in $pairs; do
          kubectl -n "$ns" create secret generic github-app-credentials \
            --from-literal=credentials="${credentials}" \
            --dry-run=client -o yaml \
            | kubectl apply -f - >/dev/null
          echo "  ok: $ns"
          n=$((n + 1))
        done

        echo "Done. ${n} Secret(s) installed (owner: {{.GITHUB_OWNER}})."
        echo "Each pair vcluster mirrors this into crossplane-system/github-app-credentials via sync.fromHost."

  # ------------------------------------------------------------------
  # Per-pair kubeconfig issuance + distribution
  # ------------------------------------------------------------------

  pairs:issue-kubeconfigs:
    desc: |
      Mint a per-pair Loft Platform access key and render a kubeconfig
      for every pair under `gitops/participant-xrs/`. Output:
      `out/kubeconfigs/<pair>.yaml`. Idempotent: re-running rotates
      every pair's access key (the previously-issued kubeconfig stops
      working).

      The kubeconfig points at the Platform proxy URL for the pair's
      VirtualClusterInstance and embeds the access key as a bearer
      token, so participants only need `kubectl` — no `vcluster` CLI
      install required.

      Auth: uses `vcluster platform create accesskey --in-cluster`,
      which talks directly to the Loft API server through the current
      kubectl context. No `PLATFORM_ACCESS_KEY` or login required —
      just point your kubeconfig at the management cluster.

      Optional env vars (sensible defaults):
        PLATFORM_HOST           https://platform-crossplane.workshops.riccardocapraro.it
                                (used as the kubeconfig server URL host)
        PLATFORM_PROJECT        default

      Usage:
        task pairs:issue-kubeconfigs
    vars:
      PLATFORM_HOST: '{{.PLATFORM_HOST | default "https://platform-crossplane.workshops.riccardocapraro.it"}}'
      PLATFORM_PROJECT: '{{.PLATFORM_PROJECT | default "default"}}'
    cmds:
      - |
        set -euo pipefail
        mkdir -p out/kubeconfigs

        n=0
        for f in gitops/participant-xrs/*.yaml; do
          pair=$(basename "$f" .yaml)

          # Rotate: delete any existing access key with this name, then
          # mint a new one. Loft stores access keys as
          # `accesskeys.storage.loft.sh` CRDs (cluster-scoped) in the
          # management cluster; the CLI has no `delete accesskey` so
          # we go via kubectl. Naming convention: `kubeconfig-<pair>`
          # for traceability. --ignore-not-found makes first run (no
          # prior key) idempotent.
          kubectl delete accesskey.storage.loft.sh "kubeconfig-${pair}" --ignore-not-found >/dev/null 2>&1 || true

          # Mint. The CLI prints the bare access-key value to stdout
          # (single line, ~64 alphanumeric chars). --in-cluster
          # bypasses the Platform API and creates the AccessKey CRD
          # via the kubectl context, so we don't need to log in. If
          # the output format changes upstream, this parsing is the
          # place to fix.
          token=$(vcluster platform create accesskey "kubeconfig-${pair}" \
            --user "${pair}" \
            --display-name "Workshop kubeconfig ${pair}" \
            --in-cluster 2>/dev/null | tr -d '[:space:]')
          if ! echo "${token}" | grep -qE '^[A-Za-z0-9]{32,}$'; then
            echo "Failed to parse access key from CLI output for ${pair}:" >&2
            echo "${token}" >&2
            exit 1
          fi

          # Render the kubeconfig. server URL = Platform proxy path
          # for this pair's VCI in the configured project (matches the
          # URL `vcluster platform connect vcluster` would generate).
          cat > "out/kubeconfigs/${pair}.yaml" <<EOF
        apiVersion: v1
        kind: Config
        clusters:
          - name: ${pair}
            cluster:
              server: {{.PLATFORM_HOST}}/kubernetes/project/{{.PLATFORM_PROJECT}}/virtualcluster/${pair}
        contexts:
          - name: ${pair}
            context:
              cluster: ${pair}
              user: ${pair}
              namespace: default
        current-context: ${pair}
        users:
          - name: ${pair}
            user:
              token: ${token}
        EOF
          chmod 600 "out/kubeconfigs/${pair}.yaml"
          echo "  ok: ${pair} → out/kubeconfigs/${pair}.yaml"
          n=$((n + 1))
        done

        echo "Done. ${n} kubeconfig(s) issued under out/kubeconfigs/."
        echo "Distribute via: task pairs:upload-kubeconfigs && task pairs:qr"

  pairs:upload-kubeconfigs:
    desc: |
      Upload the per-pair kubeconfigs in `out/kubeconfigs/` to a
      shared object store via `rclone` and capture the resulting
      shareable URLs to `out/urls.txt`. Defaults to a Google Drive
      remote — operator must have run `rclone config` once
      interactively to set up Drive OAuth.

      The shareable URL contains a high-entropy file ID (~190 bits on
      Drive), so leaking the URL is the only way someone outside the
      workshop can reach the kubeconfig. URLs auto-expire after the
      duration set by RCLONE_LINK_EXPIRE (default 24h) on backends
      that support it.

      Optional env vars:
        RCLONE_REMOTE       rclone remote name. Default: gdrive.
        RCLONE_FOLDER       Path within the remote. Default:
                            workshop-kubeconfigs.
        RCLONE_LINK_EXPIRE  Duration the shareable URL stays valid
                            (Go duration syntax). Default: 24h.

      Usage:
        task pairs:upload-kubeconfigs
    vars:
      RCLONE_REMOTE: '{{.RCLONE_REMOTE | default "gdrive"}}'
      RCLONE_FOLDER: '{{.RCLONE_FOLDER | default "workshop-kubeconfigs"}}'
      RCLONE_LINK_EXPIRE: '{{.RCLONE_LINK_EXPIRE | default "24h"}}'
    cmds:
      - |
        set -euo pipefail
        command -v rclone >/dev/null || {
          echo "rclone not found. Install via 'brew install rclone' (or your package manager)." >&2
          echo "After install, run 'rclone config' once to set up the '{{.RCLONE_REMOTE}}' remote." >&2
          exit 1
        }
        rclone listremotes 2>/dev/null | grep -q "^{{.RCLONE_REMOTE}}:$" || {
          echo "rclone remote '{{.RCLONE_REMOTE}}' not configured." >&2
          echo "Run 'rclone config' to set it up (recommended: Google Drive scope = drive.file)." >&2
          exit 1
        }
        [ -d out/kubeconfigs ] && [ -n "$(ls -A out/kubeconfigs 2>/dev/null)" ] || {
          echo "out/kubeconfigs/ is empty. Run 'task pairs:issue-kubeconfigs' first." >&2
          exit 1
        }

        # Mirror the local directory to the remote folder. --update
        # avoids re-uploading unchanged files but in practice every
        # `issue-kubeconfigs` run rotates the token, so every file is
        # new content.
        rclone copy out/kubeconfigs/ "{{.RCLONE_REMOTE}}:{{.RCLONE_FOLDER}}/" --quiet

        # Capture per-file shareable URLs. `rclone link --expire`
        # works on backends with TTL support (Drive, Box). On
        # backends without it, the flag is ignored — link still
        # works but never expires; document accordingly.
        : > out/urls.txt
        for kc in out/kubeconfigs/*.yaml; do
          pair=$(basename "$kc" .yaml)
          url=$(rclone link --expire "{{.RCLONE_LINK_EXPIRE}}" "{{.RCLONE_REMOTE}}:{{.RCLONE_FOLDER}}/${pair}.yaml")
          printf 'pair=%s url=%s\n' "${pair}" "${url}" >> out/urls.txt
          echo "  ok: ${pair} → ${url}"
        done

        echo "Done. URLs written to out/urls.txt."
        echo "Next: task pairs:qr"

  pairs:qr:
    desc: |
      Encode each per-pair shareable URL from `out/urls.txt` as a PNG
      QR code under `out/qr/`. Operator drags these onto the workshop
      Miro board so each pair can scan their own.

      Usage:
        task pairs:qr
    cmds:
      - |
        set -euo pipefail
        command -v qrencode >/dev/null || {
          echo "qrencode not found. Install via 'brew install qrencode' (or your package manager)." >&2
          exit 1
        }
        [ -f out/urls.txt ] && [ -s out/urls.txt ] || {
          echo "out/urls.txt is empty or missing. Run 'task pairs:upload-kubeconfigs' first." >&2
          exit 1
        }

        mkdir -p out/qr
        n=0
        while IFS= read -r line; do
          pair=$(echo "${line}" | sed -n 's/^pair=\([^ ]*\) .*/\1/p')
          url=$(echo "${line}" | sed -n 's/^pair=[^ ]* url=\(.*\)$/\1/p')
          [ -n "${pair}" ] && [ -n "${url}" ] || continue
          qrencode -o "out/qr/${pair}.png" -s 10 -m 2 "${url}"
          echo "  ok: ${pair} → out/qr/${pair}.png"
          n=$((n + 1))
        done < out/urls.txt

        echo "Done. ${n} QR code(s) under out/qr/. Drag onto the workshop Miro."

  pairs:distribute:
    desc: |
      Umbrella for the everyday workshop-day flow: mint per-pair
      access keys + kubeconfigs, upload to the shared remote, and
      generate the QR codes for the Miro board. Equivalent to:

        task pairs:issue-kubeconfigs
        task pairs:upload-kubeconfigs
        task pairs:qr

      Usage:
        task pairs:distribute
    cmds:
      - task: pairs:issue-kubeconfigs
      - task: pairs:upload-kubeconfigs
      - task: pairs:qr

  pairs:cleanup:
    desc: |
      Tear down everything `pairs:distribute` produced: revoke the
      per-pair AccessKey CRDs on the management cluster, purge the
      remote folder rclone uploaded to, and delete the local
      `out/` directory. Each step is best-effort — missing
      AccessKeys, an empty Drive folder, or no `out/` are all OK.

      Optional env vars (must match what `pairs:distribute` was run
      with):
        RCLONE_REMOTE   Default: gdrive
        RCLONE_FOLDER   Default: workshop-kubeconfigs

      Usage:
        task pairs:cleanup
    vars:
      RCLONE_REMOTE: '{{.RCLONE_REMOTE | default "gdrive"}}'
      RCLONE_FOLDER: '{{.RCLONE_FOLDER | default "workshop-kubeconfigs"}}'
    cmds:
      - |
        set -euo pipefail

        # Revoke per-pair AccessKeys. Skip silently if kubectl can't
        # reach a cluster (e.g. cluster already torn down).
        if kubectl version --request-timeout=2s >/dev/null 2>&1; then
          for f in gitops/participant-xrs/*.yaml; do
            pair=$(basename "$f" .yaml)
            kubectl delete accesskey.storage.loft.sh "kubeconfig-${pair}" --ignore-not-found >/dev/null
            echo "  revoked: kubeconfig-${pair}"
          done
        else
          echo "  skip: no reachable cluster — AccessKeys (if any) live with the cluster."
        fi

        # Purge the remote folder. Skip if rclone or the remote is
        # missing.
        if command -v rclone >/dev/null 2>&1 \
            && rclone listremotes 2>/dev/null | grep -q "^{{.RCLONE_REMOTE}}:$"; then
          if rclone lsd "{{.RCLONE_REMOTE}}:" 2>/dev/null | grep -q " {{.RCLONE_FOLDER}}$"; then
            rclone purge "{{.RCLONE_REMOTE}}:{{.RCLONE_FOLDER}}" --quiet
            echo "  purged: {{.RCLONE_REMOTE}}:{{.RCLONE_FOLDER}}/"
          else
            echo "  skip: {{.RCLONE_REMOTE}}:{{.RCLONE_FOLDER}}/ not found"
          fi
        else
          echo "  skip: rclone not installed or remote '{{.RCLONE_REMOTE}}' not configured."
        fi

        # Remove local artefacts.
        if [ -d out ]; then
          rm -rf out
          echo "  removed: out/"
        else
          echo "  skip: no out/ directory."
        fi

        echo "Done."

  # ------------------------------------------------------------------
  # Workshop-day operations
  #
  # Tasks the workshop owner runs *during* the workshop, in response
  # to per-pair signals (e.g. a pair finishes module 3 and asks for
  # cloud access). Distinct from `bootstrap:*` (one-time cluster
  # setup) and `pairs:*` (pre-event kubeconfig distribution).
  # ------------------------------------------------------------------

  workshop:enable-aruba:
    desc: |
      Register a participant vcluster with ArgoCD and sync the Aruba
      bundle (gitops/per-vcluster-bundle/) into it. Workshop owner
      runs this once per pair when the pair has finished module 3
      (Crossplane install) and is ready for module 4
      (Aruba managed resources).

      Idempotent: re-running upserts the ArgoCD Cluster Secret and
      re-syncs the bundle.

      Steps:
        1. Wait for the participant vcluster's pod to be Ready.
        2. Build an ArgoCD Cluster Secret in the argocd namespace,
           sourced from the vcluster Helm chart's `vc-<pair>` Secret
           in `participant-<pair>` (which carries the cluster's CA
           cert + client cert/key). Labels it
           `workshop.example.io/pair-id: <pair>` so the
           ApplicationSet's `clusters` generator picks it up.
        3. Wait for the ApplicationSet to instantiate
           `aruba-bundle-<pair>` Application.
        4. `argocd app sync aruba-bundle-<pair> --prune` — syncs the
           bundle (Aruba provider + ProviderConfig + Kyverno + pair-id
           ConfigMap + Track 3 policies) into the participant
           vcluster.

      Usage: task workshop:enable-aruba PAIR=fancy-lemon
    requires:
      vars: [PAIR]
    cmds:
      - |
        set -euo pipefail
        PAIR="{{.PAIR}}"
        HOST_NS="participant-${PAIR}"
        VC_SECRET="vc-${PAIR}"
        CLUSTER_SECRET="cluster-${PAIR}"

        echo "==> 1/4 wait for participant vcluster pod"
        kubectl wait --for=condition=Ready pod \
          -l app=vcluster -n "${HOST_NS}" --timeout=300s

        echo "==> 2/4 (re)create ArgoCD Cluster Secret for ${PAIR}"
        # Pull the vcluster's CA + client cert/key from the
        # well-known Secret the vcluster Helm chart writes. The
        # `data` fields are already base64-encoded (which is exactly
        # what ArgoCD's Cluster Secret config payload wants).
        CA=$(kubectl -n "${HOST_NS}" get secret "${VC_SECRET}" \
          -o jsonpath='{.data.certificate-authority}')
        CERT=$(kubectl -n "${HOST_NS}" get secret "${VC_SECRET}" \
          -o jsonpath='{.data.client-certificate}')
        KEY=$(kubectl -n "${HOST_NS}" get secret "${VC_SECRET}" \
          -o jsonpath='{.data.client-key}')

        # ArgoCD reaches the participant vcluster via in-cluster DNS
        # at the vcluster Service. Hostname matches the Service name
        # the Composition's Helm Release creates: `<pairId>` in
        # `participant-<pairId>`.
        SERVER_URL="https://${PAIR}.${HOST_NS}:443"

        # ArgoCD's Cluster Secret schema:
        # https://argo-cd.readthedocs.io/en/stable/operator-manual/declarative-setup/#clusters
        CONFIG_JSON=$(printf '{"tlsClientConfig":{"insecure":false,"caData":"%s","certData":"%s","keyData":"%s"}}' \
          "${CA}" "${CERT}" "${KEY}")

        cat <<EOF | kubectl apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: ${CLUSTER_SECRET}
          namespace: {{.ARGOCD_NS}}
          labels:
            argocd.argoproj.io/secret-type: cluster
            workshop.example.io/pair-id: ${PAIR}
        type: Opaque
        stringData:
          name: ${PAIR}
          server: ${SERVER_URL}
          config: |
            ${CONFIG_JSON}
        EOF

        echo "==> 3/4 wait for ApplicationSet to spawn aruba-bundle-${PAIR}"
        # ApplicationSet reconciles ~5s after seeing the new Cluster
        # Secret; allow a generous deadline.
        for _ in $(seq 1 30); do
          if kubectl -n {{.ARGOCD_NS}} get application "aruba-bundle-${PAIR}" >/dev/null 2>&1; then
            break
          fi
          sleep 2
        done
        kubectl -n {{.ARGOCD_NS}} get application "aruba-bundle-${PAIR}" >/dev/null

        echo "==> 4/4 sync aruba-bundle-${PAIR} (this is the manual gate)"
        # `--prune` so removing things from the bundle in this repo
        # cleans up in the vcluster on the next sync. Default
        # syncPolicy on the ApplicationSet is manual; this command is
        # the workshop owner's explicit go-ahead.
        argocd app sync "aruba-bundle-${PAIR}" --prune

        echo ""
        echo "${PAIR} can now `kubectl apply` Aruba managed resources."

  workshop:enable-aruba:all:
    desc: |
      Run `workshop:enable-aruba` for every discovered participant.
      Picks up the pair list from `gitops/participant-xrs/*.yaml`
      filenames (each filename is `<pairId>.yaml`).

      Failures on individual pairs do NOT halt the loop — each pair
      gets its own attempt and the summary at the end reports
      successes vs. failures so you can re-run for the failed ones.
    cmds:
      - |
        set -uo pipefail
        SUCCESS=()
        FAILED=()
        for f in gitops/participant-xrs/*.yaml; do
          [ -e "$f" ] || continue
          PAIR=$(basename "$f" .yaml)
          echo "================ ${PAIR} ================"
          if task workshop:enable-aruba PAIR="${PAIR}"; then
            SUCCESS+=("${PAIR}")
          else
            FAILED+=("${PAIR}")
          fi
        done
        echo ""
        echo "==> summary"
        echo "  succeeded: ${SUCCESS[*]:-(none)}"
        echo "  failed:    ${FAILED[*]:-(none)}"
        [ ${#FAILED[@]} -eq 0 ]

  workshop:close-event:
    desc: |
      Tear down a workshop event: remove every participant XR file
      from gitops/participant-xrs/. Once the change is merged,
      ArgoCD's prune cascade does the actual teardown:

        XR removed -> Composition deletes vcluster +
        participant namespace + ArgoCD Cluster Secret ->
        ApplicationSet drops aruba-bundle-<pair> Application ->
        in-vcluster Aruba MRs get reaped on vcluster destroy ->
        provider-arubacloud reconciles deletes against Aruba's API.

      This task removes files only. Commit + push + open PR are up
      to you — tearing down a workshop's infrastructure deserves a
      code review like any other gitops change. The next-steps hint
      at the end of the task output gives the exact commands.

      NOTE: The `aruba-creds` Secret and the underlying Aruba
      api_key are workshop-wide, NOT per-pair. After this task's PR
      merges and prune completes, separately:
        kubectl -n crossplane-system delete secret aruba-creds
        # And revoke the api_key in the Aruba console.

      Set CONFIRM=yes to skip the interactive prompt — useful for
      scripted teardown in CI.

      Usage:
        task workshop:close-event              # interactive, asks "yes"
        task workshop:close-event CONFIRM=yes
    cmds:
      - |
        set -euo pipefail

        pairs=$(ls gitops/participant-xrs/*.yaml 2>/dev/null | wc -l | tr -d ' ')
        if [ "$pairs" -eq 0 ]; then
          echo "No participant XRs in gitops/participant-xrs/. Nothing to do."
          exit 0
        fi

        echo "About to remove $pairs participant XR file(s):"
        ls gitops/participant-xrs/*.yaml | sed 's/^/  /'
        echo ""
        echo "Effect after the next ArgoCD sync (typically ~5 min after merge):"
        echo "  * each vcluster torn down via Crossplane prune"
        echo "  * each ArgoCD Cluster Secret + aruba-bundle-<pair> Application deleted"
        echo "  * in-vcluster Aruba MRs reaped, triggering provider-arubacloud"
        echo "    deletes against Aruba's API"
        echo ""

        if [ "${CONFIRM:-}" != "yes" ]; then
          read -p "Proceed? (yes/no) " response
          if [ "$response" != "yes" ]; then
            echo "aborted."
            exit 1
          fi
        fi

        git rm gitops/participant-xrs/*.yaml

        echo ""
        echo "Removed. Next steps:"
        echo "  git checkout -b chore/workshop-close-event-\$(date +%Y%m%d)"
        echo "  git commit -s -m 'chore: workshop close-event teardown'"
        echo "  git push -u origin HEAD"
        echo "  gh pr create"
        echo ""
        echo "Once merged, ArgoCD reaps everything within ~5 minutes."
        echo "Don't forget to also remove the aruba-creds Secret + revoke"
        echo "the api_key in the Aruba console (see this task's desc)."

  # ------------------------------------------------------------------
  # Verify
  # ------------------------------------------------------------------

  verify:pair:
    desc: |
      LOCAL verify for one pair — run after `task local:all`. Smoke-tests
      the inner vcluster from the operator's laptop via `kubectl
      port-forward` + the in-cluster kubeconfig Secret the vcluster
      Helm chart writes into Secret/vc-<pair>.

      This is the OPERATOR path, NOT the participant path. Participants
      never port-forward — they connect through vCluster Platform at
      https://platform-crossplane.workshops.riccardocapraro.it which proxies the
      authenticated request to the in-cluster vcluster API. To verify
      that path (and require Platform to actually be reachable), use
      `verify:pair:platform`.

      Why we don't reuse `vcluster connect` here: the participant
      vcluster is a Helm release inside the management cluster, not a
      sibling Docker-driver vcluster on the host, so `vcluster connect`
      would look for a non-existent `vcluster.cp.<pair>` container.

      Usage: task verify:pair PAIR=fancy-lemon
    requires:
      vars: [PAIR]
    cmds:
      - helm list -n {{.ARGOCD_NS}} | grep -q '^argo-cd'
      - kubectl -n {{.ARGOCD_NS}} get application root-app
      - kubectl -n {{.ARGOCD_NS}} get application participant-vclusters
      - kubectl get xdeveloperenvironments.workshop.example.io {{.PAIR}}
      - kubectl get ns participant-{{.PAIR}}
      - kubectl wait --for=condition=Ready pod -l app=vcluster -n participant-{{.PAIR}} --timeout=300s
      # Operator-side inner-vcluster smoke test. Pull the kubeconfig
      # written by the vcluster Helm chart into Secret/vc-<pair>,
      # rewrite its in-cluster server URL to a local port-forward, and
      # run `kubectl get ns` against the rewritten kubeconfig with
      # `--insecure-skip-tls-verify` (the cert SANs are the in-cluster
      # DNS names, not localhost).
      - |
        set -euo pipefail
        PAIR="{{.PAIR}}"
        NS="participant-${PAIR}"
        KCFG=$(mktemp)
        kubectl -n "${NS}" get secret "vc-${PAIR}" -o jsonpath='{.data.config}' | base64 -d \
          | sed "s|https://${PAIR}.${NS}:443|https://localhost:18443|" > "${KCFG}"
        kubectl -n "${NS}" port-forward "svc/${PAIR}" 18443:443 >/dev/null 2>&1 &
        PF=$!
        cleanup() { kill "${PF}" 2>/dev/null || true; rm -f "${KCFG}"; }
        trap cleanup EXIT
        for _ in $(seq 1 30); do
          curl -ksf https://localhost:18443/livez >/dev/null 2>&1 && break
          sleep 0.5
        done
        kubectl --kubeconfig "${KCFG}" --insecure-skip-tls-verify get ns
        # Aruba bundle smoke — skips if `task workshop:enable-aruba PAIR=...`
        # hasn't been run yet for this pair (provider CRD absent).
        KUBECONFIG="${KCFG}" INSECURE_SKIP_TLS_VERIFY=true \
          task verify:pair:aruba PAIR="{{.PAIR}}"
      - echo "{{.PAIR}} OK (local path)"

  verify:pair:aruba:
    desc: |
      Aruba bundle smoke check. Runs against the kubeconfig at
      KUBECONFIG (the caller — verify:pair or verify:pair:platform —
      sets it up). Two-stage:

        1. If provider-arubacloud's CRD isn't even installed in the
           target vcluster, the bundle hasn't been synced yet for
           this pair. Print a friendly skip and exit 0 — pre-Aruba
           pairs aren't a verify:pair failure.
        2. Otherwise: assert provider-arubacloud reaches Healthy=True,
           apply a tiny `Project.project.arubacloud.crossplane.io`
           MR named `verify-<pair>-<timestamp>`, wait <= 30 s for
           Synced=True, then delete. The Project resource is free
           per Aruba billing — no real cost — but it exercises the
           full api_key + provider runtime + Aruba API path that
           every paid resource the workshop creates relies on.

      Set INSECURE_SKIP_TLS_VERIFY=true if KUBECONFIG points at the
      localhost-rewrite tempfile verify:pair builds (the cert SANs
      are the in-cluster vcluster DNS names, not localhost).
      verify:pair:platform's Platform-proxied kubeconfig has valid
      certs so omits this.

      Not normally invoked standalone — the public surface is
      verify:pair / verify:pair:platform / verify:all. Kept
      separate so neither caller has to duplicate ~40 lines of
      smoke logic.
    requires:
      vars: [PAIR]
    cmds:
      - |
        set -euo pipefail
        PAIR="{{.PAIR}}"

        KCTL_FLAGS=""
        if [ "${INSECURE_SKIP_TLS_VERIFY:-}" = "true" ]; then
          KCTL_FLAGS="--insecure-skip-tls-verify"
        fi
        # shellcheck disable=SC2086
        K() { kubectl ${KCTL_FLAGS} "$@"; }

        if ! K get providers.pkg.crossplane.io provider-arubacloud >/dev/null 2>&1; then
          echo "  skip: Aruba bundle not yet synced for ${PAIR}"
          echo "        (run \`task workshop:enable-aruba PAIR=${PAIR}\` first)"
          exit 0
        fi

        echo "==> provider-arubacloud Healthy=True"
        K wait --for=condition=Healthy --timeout=60s \
          providers.pkg.crossplane.io/provider-arubacloud >/dev/null

        # Tiny free Project MR. Name disambiguates re-runs (timestamp)
        # and stays prefixed by the pair id so Track 3's Kyverno
        # `aruba-name-prefix` policy accepts it.
        PROJECT_NAME="${PAIR}-verify-$(date +%s)"
        echo "==> apply Project ${PROJECT_NAME}, wait for Synced=True (<= 30s)"
        K apply -f - <<EOF >/dev/null
        apiVersion: project.arubacloud.crossplane.io/v1alpha1
        kind: Project
        metadata:
          name: ${PROJECT_NAME}
        spec:
          forProvider:
            name: ${PROJECT_NAME}
            description: "verify:pair smoke test (delete-me)"
            tags:
              - crossplane-workshop
              - verify-pair-smoke
              - delete-me
          providerConfigRef:
            name: default
        EOF

        cleanup() {
          K delete project.project.arubacloud.crossplane.io \
            "${PROJECT_NAME}" --wait=false --ignore-not-found >/dev/null 2>&1 || true
        }
        trap cleanup EXIT

        deadline=$(( $(date +%s) + 30 ))
        synced=""
        while [ "$(date +%s)" -lt "${deadline}" ]; do
          synced=$(K get project.project.arubacloud.crossplane.io "${PROJECT_NAME}" \
            -o jsonpath='{.status.conditions[?(@.type=="Synced")].status}' 2>/dev/null || true)
          if [ "${synced}" = "True" ]; then break; fi
          sleep 2
        done

        if [ "${synced}" != "True" ]; then
          echo "  fail: Project ${PROJECT_NAME} did not reach Synced=True in 30s" >&2
          # cleanup() runs via trap; exit non-zero
          exit 1
        fi
        echo "  ok: Project ${PROJECT_NAME} Synced=True (real Aruba reconcile path verified)"

        echo "==> delete Project ${PROJECT_NAME} (wait for Aruba teardown)"
        K delete project.project.arubacloud.crossplane.io "${PROJECT_NAME}" --wait=true >/dev/null
        trap - EXIT
        echo "  ok: Project ${PROJECT_NAME} deleted (Aruba reconciled the delete)"

  verify:pair:platform:
    desc: |
      REMOTE verify for one pair via vCluster Platform — the SAME path
      participants take from their browser/laptop. Uses
      `vcluster platform connect vcluster <pair>` to obtain a
      Platform-proxied kubeconfig and runs `kubectl get ns` against it.
      Use this on the Aruba cluster (or any environment where Platform
      is reachable) — it actually exercises the public Envoy Gateway
      hostname, the Loft auth proxy, the per-pair access policy, and
      the upstream vcluster API in one go.

      Prereqs:
        1. vCluster Platform is exposed at PLATFORM_HOST (defaults to
           https://platform-crossplane.workshops.riccardocapraro.it).
        2. The pair's VirtualClusterInstance is registered in project
           `default` (the XDeveloperEnvironment Composition creates it,
           but Platform-side registration is currently a manual step
           on Aruba — see AGENTS.md "Known broken / deferred").
        3. You are logged in with the Platform CLI:
              vcluster platform login "${PLATFORM_HOST}" --access-key <key>
           (or the interactive browser flow). Login is cached in
           ~/.config/vcluster.

      Local vind doesn't expose Platform on a real DNS name, so use
      `verify:pair` (without `:platform`) there.

      Usage: task verify:pair:platform PAIR=fancy-lemon
    vars:
      PLATFORM_HOST: '{{.PLATFORM_HOST | default "https://platform-crossplane.workshops.riccardocapraro.it"}}'
      PROJECT: '{{.PROJECT | default "default"}}'
    requires:
      vars: [PAIR]
    cmds:
      - helm list -n {{.ARGOCD_NS}} | grep -q '^argo-cd'
      - kubectl -n {{.ARGOCD_NS}} get application root-app
      - kubectl -n {{.ARGOCD_NS}} get application participant-vclusters
      - kubectl get xdeveloperenvironments.workshop.example.io {{.PAIR}}
      - kubectl get ns participant-{{.PAIR}}
      - kubectl wait --for=condition=Ready pod -l app=vcluster -n participant-{{.PAIR}} --timeout=300s
      # Same path participants take. `vcluster platform connect
      # vcluster` writes a kubeconfig pointing at the Platform proxy
      # URL (https://<platform-host>/kubernetes/project/<project>/virtualcluster/<pair>),
      # which terminates auth and forwards to the in-cluster vcluster
      # API. If this returns a clean namespace list, the entire public
      # ingress + Platform auth + access-policy + apiserver chain is
      # working — the same chain a participant traverses.
      - |
        set -euo pipefail
        if ! vcluster platform list vclusters >/dev/null 2>&1; then
          echo "Not logged in to vCluster Platform at {{.PLATFORM_HOST}}." >&2
          echo "Run: vcluster platform login {{.PLATFORM_HOST}} --access-key <key>" >&2
          exit 1
        fi
        vcluster platform connect vcluster "{{.PAIR}}" --project "{{.PROJECT}}" -- kubectl get ns
        # Aruba bundle smoke. `vcluster platform connect ... -- KUBECONFIG=<path> ...`
        # is the trick: the connect command writes a fresh
        # platform-proxied kubeconfig and runs the trailing command
        # with KUBECONFIG already set to it. We pipe that through
        # `task verify:pair:aruba` (no INSECURE_SKIP_TLS_VERIFY —
        # the platform kubeconfig has valid certs).
        vcluster platform connect vcluster "{{.PAIR}}" --project "{{.PROJECT}}" -- \
          task verify:pair:aruba PAIR="{{.PAIR}}"
      - echo "{{.PAIR}} OK (platform path)"

  verify:all:
    desc: |
      End-to-end check for every pair under gitops/participant-xrs/.
      Runs cluster-wide preflight once (helm, root-app, AppProjects,
      participant-vclusters Application, docs Application) and then
      dispatches to verify:pair (or verify:pair:platform when
      MODE=platform) for each discovered pair, so per-pair behaviour
      is identical to running the per-pair task standalone — including
      the inner-vcluster smoke test.

      Default is MODE=local — the operator path most callers want after
      `task local:all`. Set MODE=platform on Aruba (after
      `vcluster platform login`) to exercise the participant path:
      public Envoy Gateway + Loft auth proxy + per-pair access policy
      + apiserver, all in one go.

      Note: the per-pair task repeats some of the cluster-wide
      preflight (helm, root-app, participant-vclusters Application)
      so it can be run standalone. The duplicated checks are fast,
      read-only, and idempotent.

      Usage:
        task verify:all                   # operator path (local vind)
        task verify:all MODE=platform     # participant path (Aruba)
    vars:
      MODE: '{{.MODE | default "local"}}'
    cmds:
      - |
        set -euo pipefail
        fail() { echo "FAIL: $*" >&2; exit 1; }
        ok()   { echo "  ok: $*"; }

        case "{{.MODE}}" in
          local|platform) ;;
          *) fail "unknown MODE={{.MODE}} (expected: local | platform)" ;;
        esac

        echo "==> ArgoCD helm release"
        helm list -n {{.ARGOCD_NS}} | grep -q '^argo-cd' || fail "argo-cd helm release missing"
        ok "argo-cd installed"

        echo "==> Root app-of-apps"
        kubectl -n {{.ARGOCD_NS}} get application root-app >/dev/null || fail "root-app Application missing"
        sync=$(kubectl -n {{.ARGOCD_NS}} get application root-app -o jsonpath='{.status.sync.status}')
        health=$(kubectl -n {{.ARGOCD_NS}} get application root-app -o jsonpath='{.status.health.status}')
        [ "$sync" = "Synced" ] && [ "$health" = "Healthy" ] || fail "root-app: sync=$sync health=$health"
        ok "root-app Synced+Healthy"

        echo "==> Workshop AppProject"
        kubectl -n {{.ARGOCD_NS}} get appproject workshop >/dev/null || fail "workshop AppProject missing"
        ok "workshop AppProject present"

        echo "==> Participant vclusters Application"
        kubectl get application participant-vclusters -n {{.ARGOCD_NS}} >/dev/null || fail "participant-vclusters Application missing"
        ok "participant-vclusters Application present"

        echo "==> Docs Application"
        kubectl get application docs -n {{.ARGOCD_NS}} >/dev/null 2>&1 && ok "docs Application present" || echo "  (docs Application not yet applied — skipping)"

        echo "==> Per-pair verification (MODE={{.MODE}})"
        pairs=$(ls gitops/participant-xrs/*.yaml 2>/dev/null | xargs -n1 basename | sed 's/\.yaml$//')
        [ -n "$pairs" ] || fail "no pair files under gitops/participant-xrs/"
        # Assert Synced=True up front per pair — verify:pair only checks
        # that the XR exists and the pod is Ready, which is correlated
        # but weaker than the explicit condition.
        for pair in $pairs; do
          synced=$(kubectl get xdeveloperenvironments.workshop.example.io "$pair" -o jsonpath='{.status.conditions[?(@.type=="Synced")].status}' 2>/dev/null || echo "")
          [ "$synced" = "True" ] || fail "$pair: Synced=$synced (expected True)"
        done

        for pair in $pairs; do
          echo "  --> $pair"
          if [ "{{.MODE}}" = "platform" ]; then
            task verify:pair:platform PAIR="$pair"
          else
            task verify:pair PAIR="$pair"
          fi
        done

        echo
        echo "Verify: OK ($(echo $pairs | wc -w | tr -d ' ') pair(s), MODE={{.MODE}})"

  # ------------------------------------------------------------------
  # Phase 2 — ArubaCloud
  # ------------------------------------------------------------------

  remote:register-vcluster-cloud:
    desc: "One-time: register the current cluster to vcluster.cloud (SaaS UI)."
    cmds:
      - |
        echo "Run interactively against the ArubaCloud KUBECONFIG:"
        echo "  vcluster platform login <your-vcluster.cloud-host>"
        echo "  vcluster platform connect cluster <cluster-name>"
        echo "Confirm the exact incantation on first run; see PLAN.md open items."
