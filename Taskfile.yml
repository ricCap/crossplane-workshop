version: '3'

# Every workshop operation lives here. See AGENTS.md and PLAN.md.
#
# Phase 1 (local vind):   task local:all
# Phase 2 (ArubaCloud):   task bootstrap:all && task remote:register-vcluster-cloud
# Verify a pair:          task verify:pair PAIR=fancy-lemon

vars:
  CLUSTER_NAME: crossplane-workshop
  ARGOCD_NS: argocd
  # argo/argo-cd — ArgoCD 3.3.6 app version. Bump deliberately.
  # https://github.com/argoproj/argo-helm/releases/tag/argo-cd-9.5.0
  ARGOCD_CHART_VERSION: 9.5.0
  ROOT_APP: bootstrap/root-app.yaml
  ARGOCD_VALUES: bootstrap/argocd-values.yaml

tasks:

  default:
    desc: List available tasks.
    cmds:
      - task --list
    silent: true

  # ------------------------------------------------------------------
  # Phase 1 — local (vind = vcluster CLI with Docker driver, aka
  # "vCluster in Docker" — see https://github.com/loft-sh/vind).
  # Requires vcluster CLI >= 0.31.0 and a running Docker daemon.
  # ------------------------------------------------------------------

  local:up:
    desc: "Create the local vind cluster (vcluster create with Docker driver)."
    cmds:
      - vcluster use driver docker
      - vcluster create {{.CLUSTER_NAME}}
      - kubectl cluster-info

  local:down:
    desc: Delete the local vind cluster.
    cmds:
      - vcluster delete {{.CLUSTER_NAME}}

  local:all:
    desc: "Phase 1 one-shot: local cluster up + bootstrap ArgoCD + apply root app."
    cmds:
      - task: local:up
      - task: bootstrap:all

  # ------------------------------------------------------------------
  # Bootstrap (shared by Phase 1 and Phase 2)
  # ------------------------------------------------------------------

  bootstrap:argocd:
    desc: Install ArgoCD via Helm into the current KUBECONFIG context.
    cmds:
      - helm repo add argo https://argoproj.github.io/argo-helm
      - helm repo update argo
      - |
        helm upgrade --install argo-cd argo/argo-cd \
          --namespace {{.ARGOCD_NS}} --create-namespace \
          --version {{.ARGOCD_CHART_VERSION}} \
          --values {{.ARGOCD_VALUES}} \
          --wait

  bootstrap:root-app:
    desc: Apply the root app-of-apps Application.
    deps: [bootstrap:argocd]
    cmds:
      - kubectl apply -f {{.ROOT_APP}}

  bootstrap:all:
    desc: Install ArgoCD and apply the root app-of-apps.
    cmds:
      - task: bootstrap:argocd
      - task: bootstrap:root-app

  # ------------------------------------------------------------------
  # ArgoCD UI
  # ------------------------------------------------------------------

  argocd:ui:
    desc: "Port-forward the ArgoCD UI to https://localhost:8080."
    cmds:
      - |
        echo "ArgoCD UI: https://localhost:8080"
        echo "Username:  admin"
        echo "Password:  $(kubectl -n {{.ARGOCD_NS}} get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d)"
        kubectl -n {{.ARGOCD_NS}} port-forward svc/argo-cd-argocd-server 8080:443

  # ------------------------------------------------------------------
  # Verify
  # ------------------------------------------------------------------

  verify:pair:
    desc: 'Programmatic success check for one pair. Usage: task verify:pair PAIR=fancy-lemon'
    requires:
      vars: [PAIR]
    cmds:
      - helm list -n {{.ARGOCD_NS}} | grep -q '^argo-cd'
      - kubectl -n {{.ARGOCD_NS}} get application root-app
      - kubectl -n {{.ARGOCD_NS}} get applicationset participant-vclusters
      - kubectl -n {{.ARGOCD_NS}} get application vcluster-{{.PAIR}}
      - kubectl get ns participant-{{.PAIR}}
      - kubectl -n participant-{{.PAIR}} wait --for=condition=Ready pod -l app=vcluster --timeout=300s
      - vcluster connect {{.PAIR}} -n participant-{{.PAIR}} -- kubectl get ns
      - echo "{{.PAIR}} OK"

  # ------------------------------------------------------------------
  # Phase 2 — ArubaCloud
  # ------------------------------------------------------------------

  remote:register-vcluster-cloud:
    desc: "One-time: register the current cluster to vcluster.cloud (SaaS UI)."
    cmds:
      - |
        echo "Run interactively against the ArubaCloud KUBECONFIG:"
        echo "  vcluster platform login <your-vcluster.cloud-host>"
        echo "  vcluster platform connect cluster <cluster-name>"
        echo "Confirm the exact incantation on first run; see PLAN.md open items."
