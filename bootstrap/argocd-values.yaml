# Helm values for the argo/argo-cd chart.
# Kept minimal on purpose — ingress/TLS/DNS/SSO are deferred (see PLAN.md).
#
# The ApplicationSet controller is required so the participant-vclusters
# ApplicationSet works.

global:
  domain: argocd.local

configs:
  params:
    # Phase 1 port-forward runs TLS-terminated on the server; keep defaults.
    server.insecure: false
  cm:
    # `resource.exclusions` — keys the cluster cache the
    # application-controller maintains. The chart ships a default list
    # (network/coordination/auth/cert/cilium/kyverno noise). Pod is
    # appended here as a workaround for argoproj/argo-cd#26529:
    # kubectl v0.34.0 (vendored by every released Argo CD v3.2–v3.4)
    # panics with `assignment to entry in nil map` inside
    # `populatePodInfo`, on a pod shape we could not narrow down by
    # JSON inspection (relax-pair-quota in #139 was necessary but not
    # sufficient). Excluding Pod from the controller's cluster cache
    # skips the panicking code path entirely.
    #
    # Trade-off: Argo CD UI loses per-pod cards under Applications, and
    # Application health rolls up from Deployment/StatefulSet/etc.
    # status alone (no per-pod aggregation). Acceptable for this
    # workshop — participants interact with their workloads via
    # vCluster Platform, not Argo CD's UI.
    #
    # **Important: this is the full list, not an addition.** Helm
    # string overrides replace, they don't merge. Mirror chart-default
    # bumps here when bumping `argo-cd` chart version (currently
    # 9.5.0). Remove the trailing Pod entry — and this comment — once
    # Argo CD ships a release vendoring `k8s.io/kubectl` ≥ v0.36.0
    # (kubernetes/kubernetes#136534).
    resource.exclusions: |
      ### Network resources created by the Kubernetes control plane and excluded to reduce the number of watched events and UI clutter
      - apiGroups:
        - ''
        - discovery.k8s.io
        kinds:
        - Endpoints
        - EndpointSlice
      ### Internal Kubernetes resources excluded reduce the number of watched events
      - apiGroups:
        - coordination.k8s.io
        kinds:
        - Lease
      ### Internal Kubernetes Authz/Authn resources excluded reduce the number of watched events
      - apiGroups:
        - authentication.k8s.io
        - authorization.k8s.io
        kinds:
        - SelfSubjectReview
        - TokenReview
        - LocalSubjectAccessReview
        - SelfSubjectAccessReview
        - SelfSubjectRulesReview
        - SubjectAccessReview
      ### Intermediate Certificate Request excluded reduce the number of watched events
      - apiGroups:
        - certificates.k8s.io
        kinds:
        - CertificateSigningRequest
      - apiGroups:
        - cert-manager.io
        kinds:
        - CertificateRequest
      ### Cilium internal resources excluded reduce the number of watched events and UI Clutter
      - apiGroups:
        - cilium.io
        kinds:
        - CiliumIdentity
        - CiliumEndpoint
        - CiliumEndpointSlice
      ### Kyverno intermediate and reporting resources excluded reduce the number of watched events and improve performance
      - apiGroups:
        - kyverno.io
        - reports.kyverno.io
        - wgpolicyk8s.io
        kinds:
        - PolicyReport
        - ClusterPolicyReport
        - EphemeralReport
        - ClusterEphemeralReport
        - AdmissionReport
        - ClusterAdmissionReport
        - BackgroundScanReport
        - ClusterBackgroundScanReport
        - UpdateRequest
      ### Pod excluded as workaround for argoproj/argo-cd#26529 (kubectl v0.34.0 panic in populatePodInfo). Drop when Argo CD ships kubectl >= v0.36.0.
      - apiGroups:
        - ''
        kinds:
        - Pod

server:
  extraArgs:
    - --insecure=false

applicationSet:
  enabled: true

controller:
  replicas: 1

repoServer:
  replicas: 1

redis:
  enabled: true
