# Root app-of-apps. After bootstrap, this is the only thing applied imperatively;
# everything else is reconciled from gitops/ by ArgoCD itself.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ricCap/crossplane-workshop.git
    targetRevision: main
    path: gitops
    directory:
      recurse: true
      include: '{projects/*.yaml,apps/*.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
