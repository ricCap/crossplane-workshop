# Cluster-wide ingress controller for the workshop. Reached locally via
# `task wall:ui`, which port-forwards the controller Service to
# http://localhost:8100/. Downstream consumers:
#
#   - gitops/docs/ingress.yaml          serves the docs + /wall page
#   - gitops/apps/participant-ingress   per-pair Ingress routing
#                                       /team/<pair>/{api,/} to the
#                                       vcluster-synced backend/frontend
#                                       Services
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
spec:
  project: workshop
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    # Latest stable at the time of authoring. Bump deliberately.
    targetRevision: 4.15.1
    helm:
      releaseName: ingress-nginx
      values: |
        controller:
          # ClusterIP is enough for Phase 1 (local vind, reached via
          # `task wall:ui` port-forward). Phase 2 on ArubaCloud will
          # switch this to LoadBalancer.
          service:
            type: ClusterIP
          # Turn off the default admission webhook TLS validation step —
          # in Phase 1 the validator is overkill and adds a failure mode
          # if cert-manager isn't installed.
          admissionWebhooks:
            enabled: false
          # Single-replica is enough for the workshop blast radius.
          replicaCount: 1
          resources:
            requests:
              cpu: 50m
              memory: 90Mi
            limits:
              cpu: 500m
              memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
