# vCluster Platform routing config (HTTPRoute).
# The Platform itself is installed via `task bootstrap:vcluster-platform`
# to keep the admin password out of git.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vcluster-platform-config
  namespace: argocd
spec:
  project: workshop
  source:
    repoURL: git@github.com:ricCap/crossplane-workshop.git
    targetRevision: main
    path: gitops/vcluster-platform
  destination:
    server: https://kubernetes.default.svc
    namespace: vcluster-platform
  # The Loft Platform admission controller mutates Project specs
  # after apply — it injects an additional `loft-access` rule and
  # reorders `spec.access` entries. That drift is intrinsic to the
  # Loft webhook, not something we can fix in git, so ignore the
  # whole `spec.access` field on Projects to keep the app Synced.
  ignoreDifferences:
    # The Project manifest in `gitops/vcluster-platform/project.yaml`
    # is `apiVersion: storage.loft.sh/v1` — that's the group ArgoCD
    # uses when matching ignoreDifferences against the desired state
    # (the live object surfaces under both `storage.loft.sh` and
    # `management.loft.sh`, but the rule has to match git).
    - group: storage.loft.sh
      kind: Project
      jsonPointers:
        - /spec/access
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
