# Crossplane config that depends on provider-helm CRDs: ProviderConfig,
# DeveloperEnvironment XRD, and the Composition. Depends on crossplane-packages
# (gitops/apps/crossplane-packages.yaml) being synced first so the
# ProviderConfig CRD exists. ArgoCD retries until it does.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crossplane-config
  namespace: argocd
spec:
  project: workshop
  source:
    repoURL: git@github.com:ricCap/crossplane-workshop.git
    targetRevision: main
    path: gitops/crossplane-config
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
