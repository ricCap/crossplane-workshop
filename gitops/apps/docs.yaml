apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: docs
  namespace: argocd
spec:
  project: workshop
  source:
    repoURL: git@github.com:ricCap/crossplane-workshop.git
    targetRevision: main
    path: gitops/docs
  destination:
    server: https://kubernetes.default.svc
    namespace: docs
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    # HPA owns replica count; ArgoCD selfHeal must not revert it.
    - group: apps
      kind: Deployment
      name: docs
      namespace: docs
      jsonPointers:
        - /spec/replicas
