# The Phase 3 swap seam lives in the `template.spec.source` block below.
# See PLAN.md §Phase 3: the eventual "gotcha moment" is that this block
# is replaced with one that renders an XVCluster XR backed by a Crossplane
# Composition using provider-helm — same chart, same values, different layer.
#
# The git-files generator reads one file per participant pair from
# gitops/participant-vclusters/pairs/ — that directory is the scale lever.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: participant-vclusters
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: git@github.com:ricCap/crossplane-workshop.git
        revision: main
        files:
          - path: gitops/participant-vclusters/pairs/*.yaml
  template:
    metadata:
      name: 'vcluster-{{ .pair_id }}'
    spec:
      project: workshop
      # -----------------------------------------------------------------
      # PHASE 3 SWAP SEAM — everything inside `source` is what Phase 3
      # replaces with a Crossplane XR. Keep the shape outside this block
      # stable so the swap is a minimal diff.
      # -----------------------------------------------------------------
      source:
        repoURL: https://charts.loft.sh
        chart: vcluster
        # Current stable on https://charts.loft.sh as of the commit that
        # introduced this pin. Chart schema is the v0.20+ `sync.toHost.*`
        # shape; the v0.19 flat schema would not work here.
        targetRevision: 0.33.1
        helm:
          releaseName: '{{ .pair_id }}'
          values: |
            # OSS build — no loft-sh/vcluster-pro image, no telemetry
            # surprises during a public workshop.
            controlPlane:
              statefulSet:
                image:
                  registry: ghcr.io
                  repository: loft-sh/vcluster-oss
                # Workshop-sized: enough to run crossplane + a couple of
                # managed resources per pair, small enough that ~15 pairs
                # fit on one modest management cluster.
                resources:
                  requests:
                    cpu: 100m
                    memory: 256Mi
                    ephemeral-storage: 500Mi
                  limits:
                    cpu: 500m
                    memory: 1Gi
                    ephemeral-storage: 5Gi
            sync:
              toHost:
                ingresses:
                  enabled: false
            # Secret name defaults to vc-<release>; the validator
            # (gitops/docs/) relies on that default.
            exportKubeConfig:
              server: ""
      # -----------------------------------------------------------------
      destination:
        server: https://kubernetes.default.svc
        namespace: 'participant-{{ .pair_id }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
