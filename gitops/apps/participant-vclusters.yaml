# Each file in gitops/participant-xrs/ is a cluster-scoped
# XDeveloperEnvironment XR (Crossplane v2, no claim layer). The
# XDeveloperEnvironment Composition reconciles each one into a full
# participant environment: Namespace, vcluster Helm Release, per-pair
# HTTPRoute, and ResourceQuota.
#
# Scale lever: add a new YAML file to gitops/participant-xrs/ with
# just the pair ID. Crossplane does the rest.
#
# The "gotcha moment" reveal: participants discover that the
# environment they used the whole workshop was itself a
# Crossplane-managed resource.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: participant-vclusters
  namespace: argocd
spec:
  project: workshop
  source:
    repoURL: git@github.com:ricCap/crossplane-workshop.git
    targetRevision: main
    path: gitops/participant-xrs
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
