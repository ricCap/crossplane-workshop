# Each file in gitops/participant-claims/ is an XVCluster composite
# resource. Crossplane's XVCluster Composition reconciles each one into
# a full participant environment: Namespace, vcluster Helm Release,
# per-pair Ingress, and ResourceQuota.
#
# Scale lever: add a new YAML file to gitops/participant-claims/ with
# just the pair ID. Crossplane does the rest.
#
# This replaces the old ApplicationSet + two Helm charts approach.
# The "gotcha moment" reveal: participants discover that the vcluster
# they used the whole workshop was itself a Crossplane-managed resource.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: participant-vclusters
  namespace: argocd
spec:
  project: workshop
  source:
    repoURL: git@github.com:ricCap/crossplane-workshop.git
    targetRevision: main
    path: gitops/participant-claims
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
