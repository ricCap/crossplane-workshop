# Crossplane packages on the management cluster: provider-helm,
# function-patch-and-transform, DeploymentRuntimeConfig, and RBAC.
# These install first; once provider-helm is Healthy, its CRDs become
# available and crossplane-config (ProviderConfig, XRD, Composition)
# can sync.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crossplane-packages
  namespace: argocd
spec:
  project: workshop
  source:
    repoURL: git@github.com:ricCap/crossplane-workshop.git
    targetRevision: main
    path: gitops/crossplane-packages
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
