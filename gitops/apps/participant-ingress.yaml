# One Ingress per participant pair, living on the management cluster
# in the `participant-<pair>` namespace. Reuses the same git-files
# generator as `participant-vclusters.yaml` so the pair list stays in
# one place (`gitops/participant-vclusters/pairs/*.yaml`) — adding a
# new pair file spawns both its vcluster AND its ingress with no
# other change. The rendered Ingress backends point at synced host
# Services created by the vcluster's `sync.toHost.services`.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: participant-ingress
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: git@github.com:ricCap/crossplane-workshop.git
        revision: main
        files:
          - path: gitops/participant-vclusters/pairs/*.yaml
  template:
    metadata:
      name: 'ingress-{{ .pair_id }}'
    spec:
      project: workshop
      source:
        repoURL: git@github.com:ricCap/crossplane-workshop.git
        targetRevision: main
        path: gitops/participant-ingress
        helm:
          releaseName: 'ingress-{{ .pair_id }}'
          valuesObject:
            pairId: '{{ .pair_id }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: 'participant-{{ .pair_id }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
