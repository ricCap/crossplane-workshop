# In-cluster identity — provider-helm uses its own SA token to talk to
# the Kubernetes API and install Helm releases on this cluster.
apiVersion: helm.crossplane.io/v1beta1
kind: ProviderConfig
metadata:
  name: default
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  credentials:
    source: InjectedIdentity
