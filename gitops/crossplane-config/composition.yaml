# Composition that turns a VCluster claim into a complete participant
# environment: namespace, vcluster Helm release, per-pair HTTPRoute
# for /team/<pair>/ routing via Gateway API, and a ResourceQuota.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: vclusters.workshop.example.io
spec:
  compositeTypeRef:
    apiVersion: workshop.example.io/v1alpha1
    kind: XVCluster
  mode: Pipeline
  pipeline:
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          # --- 1. Namespace ---
          - name: namespace
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: Namespace
                    metadata:
                      name: placeholder
            patches:
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "participant-%s"
                toFieldPath: spec.forProvider.manifest.metadata.name

          # --- 2. vcluster Helm Release ---
          - name: vcluster-release
            base:
              apiVersion: helm.crossplane.io/v1beta1
              kind: Release
              spec:
                forProvider:
                  chart:
                    name: vcluster
                    repository: https://charts.loft.sh
                    version: "0.33.1"
                  namespace: placeholder
                  values:
                    controlPlane:
                      statefulSet:
                        image:
                          registry: ghcr.io
                          repository: loft-sh/vcluster-pro
                        persistence:
                          addVolumes:
                            - name: platform-api-key
                              secret:
                                secretName: vcluster-platform-api-key
                                optional: true
                          addVolumeMounts:
                            - name: platform-api-key
                              mountPath: /var/vcluster/platform
                              readOnly: true
                        resources:
                          requests:
                            cpu: 100m
                            memory: 256Mi
                            ephemeral-storage: 500Mi
                          limits:
                            cpu: 500m
                            memory: 1Gi
                            ephemeral-storage: 5Gi
                    sync:
                      toHost:
                        services:
                          enabled: true
                        ingresses:
                          enabled: false
                    exportKubeConfig:
                      server: placeholder
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.pairId
                toFieldPath: metadata.name
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "participant-%s"
                toFieldPath: spec.forProvider.namespace
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "https://%s.participant-%s:443"
                toFieldPath: spec.forProvider.values.exportKubeConfig.server

          # --- 3. Per-pair HTTPRoute ---
          # Routes /team/<pair>/api/* to the backend synced Service and
          # /team/<pair>/* to the frontend synced Service. Uses Gateway
          # API URLRewrite with ReplacePrefixMatch to strip the
          # /team/<pair> prefix so upstream Services see clean paths.
          # Longest prefix match ensures /api wins over /.
          - name: httproute
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                forProvider:
                  manifest:
                    apiVersion: gateway.networking.k8s.io/v1
                    kind: HTTPRoute
                    metadata:
                      name: placeholder
                      namespace: placeholder
                    spec:
                      parentRefs:
                        - name: workshop
                          namespace: envoy-gateway-system
                          sectionName: https
                      rules:
                        # API route — longest prefix wins over the
                        # catch-all frontend route below.
                        - matches:
                            - path:
                                type: PathPrefix
                                value: /team/PAIR/api
                          filters:
                            - type: URLRewrite
                              urlRewrite:
                                path:
                                  type: ReplacePrefixMatch
                                  replacePrefixMatch: /
                          backendRefs:
                            - name: backend-x-default-x-PAIR
                              port: 5678
                        # Frontend catch-all route.
                        - matches:
                            - path:
                                type: PathPrefix
                                value: /team/PAIR
                          filters:
                            - type: URLRewrite
                              urlRewrite:
                                path:
                                  type: ReplacePrefixMatch
                                  replacePrefixMatch: /
                          backendRefs:
                            - name: frontend-x-default-x-PAIR
                              port: 80
            patches:
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "team-%s"
                toFieldPath: spec.forProvider.manifest.metadata.name
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "participant-%s"
                toFieldPath: spec.forProvider.manifest.metadata.namespace
              # Patch path prefixes and service names with the pair ID.
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "/team/%s/api"
                toFieldPath: spec.forProvider.manifest.spec.rules[0].matches[0].path.value
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "backend-x-default-x-%s"
                toFieldPath: spec.forProvider.manifest.spec.rules[0].backendRefs[0].name
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "/team/%s"
                toFieldPath: spec.forProvider.manifest.spec.rules[1].matches[0].path.value
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "frontend-x-default-x-%s"
                toFieldPath: spec.forProvider.manifest.spec.rules[1].backendRefs[0].name

          # --- 4. ResourceQuota ---
          # Values are patched from spec.quota.* on the XVCluster claim.
          # The XRD defines defaults so claims without explicit quota
          # still get sensible limits.
          - name: resource-quota
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: ResourceQuota
                    metadata:
                      name: pair-quota
                      namespace: placeholder
                    spec:
                      hard:
                        requests.cpu: "2"
                        requests.memory: 4Gi
                        limits.cpu: "4"
                        limits.memory: 8Gi
                        pods: "30"
                        services: "20"
                        configmaps: "30"
                        secrets: "50"
                        persistentvolumeclaims: "5"
            patches:
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "participant-%s"
                toFieldPath: spec.forProvider.manifest.metadata.namespace
              - type: FromCompositeFieldPath
                fromFieldPath: spec.quota.cpu
                toFieldPath: spec.forProvider.manifest.spec.hard[requests.cpu]
              - type: FromCompositeFieldPath
                fromFieldPath: spec.quota.memory
                toFieldPath: spec.forProvider.manifest.spec.hard[requests.memory]
              - type: FromCompositeFieldPath
                fromFieldPath: spec.quota.limitsCpu
                toFieldPath: spec.forProvider.manifest.spec.hard[limits.cpu]
              - type: FromCompositeFieldPath
                fromFieldPath: spec.quota.limitsMemory
                toFieldPath: spec.forProvider.manifest.spec.hard[limits.memory]
              - type: FromCompositeFieldPath
                fromFieldPath: spec.quota.pods
                toFieldPath: spec.forProvider.manifest.spec.hard.pods


    # --- Step 2: Platform user (go-templating) ---
    # Generates a non-guessable password (SHA256 of pair ID + salt,
    # truncated to 24 chars) and creates a Platform User + password
    # Secret so participants can log in and download their kubeconfig.
    - step: platform-user
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{ $pairId := .observed.composite.resource.spec.pairId }}
            {{ $password := printf "%s:crossplane-workshop-2026:platform-access" $pairId | sha256sum | trunc 24 }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: platform-password-{{ $pairId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: platform-password
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Secret
                  metadata:
                    name: loft-user-secret-{{ $pairId }}
                    namespace: vcluster-platform
                  type: Opaque
                  data:
                    password: {{ $password | b64enc }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: platform-user-{{ $pairId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: platform-user
            spec:
              forProvider:
                manifest:
                  apiVersion: management.loft.sh/v1
                  kind: User
                  metadata:
                    name: {{ $pairId }}
                  spec:
                    displayName: {{ $pairId }}
                    username: {{ $pairId }}
                    subject: {{ $pairId }}
                    passwordRef:
                      secretName: loft-user-secret-{{ $pairId }}
                      secretNamespace: vcluster-platform
                      key: password
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: platform-vci-access-{{ $pairId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: platform-vci-access
            spec:
              forProvider:
                manifest:
                  apiVersion: storage.loft.sh/v1
                  kind: VirtualClusterInstance
                  metadata:
                    name: {{ $pairId }}
                    namespace: p-default
                  spec:
                    access:
                      - name: pair-owner
                        verbs: ["*"]
                        users: ["{{ $pairId }}"]
                      - name: admin-access
                        verbs: ["*"]
                        users: ["admin"]
                    template:
                      access:
                        defaultClusterRole: ""
                        rules:
                          - users: ["{{ $pairId }}"]
                            clusterRole: cluster-admin

    # --- Step 3: Auto-ready ---
    # Marks the XR as Ready when all composed resources are Ready.
    # Required because function-go-templating resources don't
    # propagate readiness to the composite by default.
    - step: auto-ready
      functionRef:
        name: function-auto-ready
