# Composition that turns a VCluster claim into a complete participant
# environment: namespace, vcluster Helm release, per-pair Ingress for
# /team/<pair>/ routing, and a ResourceQuota.
#
# Previously the Ingress and ResourceQuota were managed by a separate
# ArgoCD ApplicationSet + Helm chart. Now everything lives in one
# Composition — no Helm templates needed.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: vclusters.workshop.example.io
spec:
  compositeTypeRef:
    apiVersion: workshop.example.io/v1alpha1
    kind: XVCluster
  mode: Pipeline
  pipeline:
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          # --- 1. Namespace ---
          - name: namespace
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: Namespace
                    metadata:
                      name: placeholder
            patches:
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "participant-%s"
                toFieldPath: spec.forProvider.manifest.metadata.name

          # --- 2. vcluster Helm Release ---
          - name: vcluster-release
            base:
              apiVersion: helm.crossplane.io/v1beta1
              kind: Release
              spec:
                forProvider:
                  chart:
                    name: vcluster
                    repository: https://charts.loft.sh
                    version: "0.33.1"
                  namespace: placeholder
                  values:
                    controlPlane:
                      statefulSet:
                        image:
                          registry: ghcr.io
                          repository: loft-sh/vcluster-oss
                        resources:
                          requests:
                            cpu: 100m
                            memory: 256Mi
                            ephemeral-storage: 500Mi
                          limits:
                            cpu: 500m
                            memory: 1Gi
                            ephemeral-storage: 5Gi
                    sync:
                      toHost:
                        services:
                          enabled: true
                        ingresses:
                          enabled: false
                    exportKubeConfig:
                      server: placeholder
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.pairId
                toFieldPath: metadata.name
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "participant-%s"
                toFieldPath: spec.forProvider.namespace
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "https://%s.participant-%s:443"
                toFieldPath: spec.forProvider.values.exportKubeConfig.server

          # --- 3. Per-pair Ingress ---
          # Routes /team/<pair>/api/* to the backend synced Service and
          # /team/<pair>/* to the frontend synced Service. Uses regex
          # capture groups + rewrite-target to strip the /team/<pair>
          # prefix so upstream Services see clean paths.
          - name: ingress
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                forProvider:
                  manifest:
                    apiVersion: networking.k8s.io/v1
                    kind: Ingress
                    metadata:
                      name: placeholder
                      namespace: placeholder
                      annotations:
                        nginx.ingress.kubernetes.io/use-regex: "true"
                        nginx.ingress.kubernetes.io/rewrite-target: /$2
                    spec:
                      ingressClassName: nginx
                      rules:
                        - http:
                            paths:
                              - path: /team/PAIR/api(/|$)(.*)
                                pathType: ImplementationSpecific
                                backend:
                                  service:
                                    name: backend-x-default-x-PAIR
                                    port:
                                      number: 5678
                              - path: /team/PAIR(/|$)(.*)
                                pathType: ImplementationSpecific
                                backend:
                                  service:
                                    name: frontend-x-default-x-PAIR
                                    port:
                                      number: 80
            patches:
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "team-%s"
                toFieldPath: spec.forProvider.manifest.metadata.name
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "participant-%s"
                toFieldPath: spec.forProvider.manifest.metadata.namespace
              # Patch the path rules and service names with the pair ID.
              # Each path/service reference containing "PAIR" is patched.
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "/team/%s/api(/|$)(.*)"
                toFieldPath: spec.forProvider.manifest.spec.rules[0].http.paths[0].path
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "backend-x-default-x-%s"
                toFieldPath: spec.forProvider.manifest.spec.rules[0].http.paths[0].backend.service.name
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "/team/%s(/|$)(.*)"
                toFieldPath: spec.forProvider.manifest.spec.rules[0].http.paths[1].path
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "frontend-x-default-x-%s"
                toFieldPath: spec.forProvider.manifest.spec.rules[0].http.paths[1].backend.service.name

          # --- 4. ResourceQuota ---
          - name: resource-quota
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: ResourceQuota
                    metadata:
                      name: pair-quota
                      namespace: placeholder
                    spec:
                      hard:
                        requests.cpu: "2"
                        requests.memory: 4Gi
                        limits.cpu: "4"
                        limits.memory: 8Gi
                        pods: "30"
                        services: "20"
                        configmaps: "30"
                        secrets: "50"
                        persistentvolumeclaims: "5"
            patches:
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "participant-%s"
                toFieldPath: spec.forProvider.manifest.metadata.namespace
