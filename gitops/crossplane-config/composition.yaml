# Composition that turns an XDeveloperEnvironment XR (Crossplane v2,
# cluster-scoped, no claim layer) into a complete participant
# environment: namespace, vcluster Helm release, per-pair HTTPRoute
# for /team/<pair>/ routing via Gateway API, and a ResourceQuota.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: developerenvironments.workshop.example.io
spec:
  compositeTypeRef:
    apiVersion: workshop.example.io/v1alpha1
    kind: XDeveloperEnvironment
  mode: Pipeline
  pipeline:
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          # --- 1. Namespace ---
          - name: namespace
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: Namespace
                    metadata:
                      name: placeholder
            patches:
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "participant-%s"
                toFieldPath: spec.forProvider.manifest.metadata.name

          # --- 2. vcluster Helm Release ---
          - name: vcluster-release
            base:
              apiVersion: helm.crossplane.io/v1beta1
              kind: Release
              spec:
                forProvider:
                  chart:
                    name: vcluster
                    repository: https://charts.loft.sh
                    version: "0.33.1"
                  namespace: placeholder
                  values:
                    controlPlane:
                      statefulSet:
                        image:
                          registry: ghcr.io
                          repository: loft-sh/vcluster-pro
                        persistence:
                          addVolumes:
                            - name: platform-api-key
                              secret:
                                secretName: vcluster-platform-api-key
                                optional: true
                          addVolumeMounts:
                            - name: platform-api-key
                              mountPath: /var/vcluster/platform
                              readOnly: true
                        resources:
                          requests:
                            cpu: 100m
                            memory: 256Mi
                            ephemeral-storage: 500Mi
                          limits:
                            cpu: 500m
                            memory: 1Gi
                            ephemeral-storage: 5Gi
                    sync:
                      toHost:
                        services:
                          enabled: true
                        ingresses:
                          enabled: false
                      fromHost:
                        # Two host->vcluster Secret mirrors:
                        #
                        # 1. github-app-credentials — sourced from
                        #    this vcluster's own host namespace
                        #    (participant-<pair>), provisioned
                        #    out-of-band by `task github:register`.
                        #    Leading "/" shorthand = "this vcluster's
                        #    own host namespace", so no per-pair
                        #    patching is needed.
                        #
                        # 2. aruba-creds — sourced from the management
                        #    cluster's `crossplane-system` namespace,
                        #    a single shared Aruba API key provisioned
                        #    out-of-band by
                        #    `task bootstrap:aruba-cloud-credentials`.
                        #    The destination namespace (aruba-system)
                        #    is created by the per-vcluster ArgoCD
                        #    bundle (Track 2 of #44); the secret
                        #    appears in the vcluster only after that
                        #    bundle is synced.
                        secrets:
                          enabled: true
                          mappings:
                            byName:
                              "/github-app-credentials": "crossplane-system/github-app-credentials"
                              "crossplane-system/aruba-creds": "aruba-system/aruba-creds"
                    exportKubeConfig:
                      server: placeholder
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.pairId
                toFieldPath: metadata.name
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "participant-%s"
                toFieldPath: spec.forProvider.namespace
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "https://%s.participant-%s:443"
                toFieldPath: spec.forProvider.values.exportKubeConfig.server

          # --- 3. Per-pair HTTPRoute ---
          # Routes /team/<pair>/api/* to the backend synced Service and
          # /team/<pair>/* to the frontend synced Service. Uses Gateway
          # API URLRewrite with ReplacePrefixMatch to strip the
          # /team/<pair> prefix so upstream Services see clean paths.
          # Longest prefix match ensures /api wins over /.
          - name: httproute
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                forProvider:
                  manifest:
                    apiVersion: gateway.networking.k8s.io/v1
                    kind: HTTPRoute
                    metadata:
                      name: placeholder
                      namespace: placeholder
                    spec:
                      parentRefs:
                        - name: workshop
                          namespace: envoy-gateway-system
                          sectionName: https
                      rules:
                        # API route — longest prefix wins over the
                        # catch-all frontend route below.
                        - matches:
                            - path:
                                type: PathPrefix
                                value: /team/PAIR/api
                          filters:
                            - type: URLRewrite
                              urlRewrite:
                                path:
                                  type: ReplacePrefixMatch
                                  replacePrefixMatch: /
                          backendRefs:
                            - name: backend-x-default-x-PAIR
                              port: 5678
                        # Frontend catch-all route.
                        - matches:
                            - path:
                                type: PathPrefix
                                value: /team/PAIR
                          filters:
                            - type: URLRewrite
                              urlRewrite:
                                path:
                                  type: ReplacePrefixMatch
                                  replacePrefixMatch: /
                          backendRefs:
                            - name: frontend-x-default-x-PAIR
                              port: 80
            patches:
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "team-%s"
                toFieldPath: spec.forProvider.manifest.metadata.name
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "participant-%s"
                toFieldPath: spec.forProvider.manifest.metadata.namespace
              # Patch path prefixes and service names with the pair ID.
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "/team/%s/api"
                toFieldPath: spec.forProvider.manifest.spec.rules[0].matches[0].path.value
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "backend-x-default-x-%s"
                toFieldPath: spec.forProvider.manifest.spec.rules[0].backendRefs[0].name
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "/team/%s"
                toFieldPath: spec.forProvider.manifest.spec.rules[1].matches[0].path.value
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "frontend-x-default-x-%s"
                toFieldPath: spec.forProvider.manifest.spec.rules[1].backendRefs[0].name

          # --- 4. ResourceQuota ---
          # Values are patched from spec.quota.* on the XDeveloperEnvironment XR.
          # The XRD defines defaults so XRs without explicit quota
          # still get sensible limits.
          - name: resource-quota
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: ResourceQuota
                    metadata:
                      name: pair-quota
                      namespace: placeholder
                    spec:
                      hard:
                        requests.cpu: "2"
                        requests.memory: 4Gi
                        # Matches the XRD default raised in #40.
                        # The Composition's base manifest is what
                        # gets emitted when an XR omits spec.quota
                        # entirely, because OpenAPI schema defaulting
                        # only fills children when the parent object
                        # is present — and our participant XRs ship
                        # without a spec.quota block, so the XRD
                        # default for limitsCpu never fires.
                        limits.cpu: "6"
                        limits.memory: 8Gi
                        # ephemeral-storage caps — closes the node-disk
                        # DoS vector (#80). Without these, a pod can
                        # `dd` into emptyDir until kubelet evicts at
                        # node level, taking other pairs on the node
                        # down with it. The LimitRange below defaults
                        # missing per-container fields so this quota's
                        # admission gate doesn't reject pods that ship
                        # without explicit ephemeral-storage requests.
                        requests.ephemeral-storage: 5Gi
                        limits.ephemeral-storage: 10Gi
                        pods: "30"
                        services: "20"
                        configmaps: "30"
                        secrets: "50"
                        persistentvolumeclaims: "5"
                        # PVC size cap (#82) — the count cap above
                        # only stops "5 × 100Gi PVCs" if we also bound
                        # the aggregate. Total fits inside a single
                        # 20Gi node disk slice, well below any
                        # reasonable Aruba node size.
                        requests.storage: 20Gi
            patches:
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "participant-%s"
                toFieldPath: spec.forProvider.manifest.metadata.namespace
              - type: FromCompositeFieldPath
                fromFieldPath: spec.quota.cpu
                toFieldPath: spec.forProvider.manifest.spec.hard[requests.cpu]
              - type: FromCompositeFieldPath
                fromFieldPath: spec.quota.memory
                toFieldPath: spec.forProvider.manifest.spec.hard[requests.memory]
              - type: FromCompositeFieldPath
                fromFieldPath: spec.quota.limitsCpu
                toFieldPath: spec.forProvider.manifest.spec.hard[limits.cpu]
              - type: FromCompositeFieldPath
                fromFieldPath: spec.quota.limitsMemory
                toFieldPath: spec.forProvider.manifest.spec.hard[limits.memory]
              - type: FromCompositeFieldPath
                fromFieldPath: spec.quota.pods
                toFieldPath: spec.forProvider.manifest.spec.hard.pods

          # --- 5. LimitRange ---
          # Auto-fills container requests/limits for pods that ship
          # without them. Required because the per-pair ResourceQuota
          # above declares the four request/limit keys in spec.hard,
          # which flips on Kubernetes' "every container must declare
          # all four resource fields" admission rule. Upstream charts
          # used by the workshop (e.g. UXP's apollo sidecars and the
          # upbound-controller-manager initialize-crds initContainer)
          # ship containers without complete resource specs and would
          # otherwise be rejected by the host syncer's admission, which
          # makes module 3's `helm install crossplane … --wait` time
          # out silently.
          #
          # LimitRange admission runs before ResourceQuota, so missing
          # fields get defaulted in time for the quota gate. Defaults
          # are tuned for sidecar-shaped containers (apollo-syncer,
          # postgres, init containers) — the apollo pod has three
          # containers and only one specifies its own resources, so
          # the other two pick up these defaults twice. With 200m
          # default cpu the apollo pod's total limits.cpu is
          # 1 (uxp-apollo) + 0.2 + 0.2 = 1.4, leaving headroom under
          # the per-pair 4 CPU limits.cpu cap once the vcluster
          # syncer, coredns, crossplane core, and webui are also
          # accounted for.
          - name: limit-range
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: LimitRange
                    metadata:
                      name: pair-defaults
                      namespace: placeholder
                    spec:
                      limits:
                        - type: Container
                          defaultRequest:
                            cpu: 25m
                            memory: 32Mi
                            # Defaults for the ephemeral-storage caps
                            # added to the ResourceQuota above (#80).
                            # Most workshop containers don't write to
                            # ephemeral disk; the ones that do
                            # (UXP Apollo init, helm-release pods)
                            # need a few hundred MiB at most. 64Mi
                            # request × ~30 pods = ~2Gi, leaves
                            # headroom under the 5Gi requests cap.
                            ephemeral-storage: 64Mi
                          default:
                            cpu: 200m
                            memory: 192Mi
                            ephemeral-storage: 512Mi
            patches:
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.pairId
                  strategy: string
                  string:
                    fmt: "participant-%s"
                toFieldPath: spec.forProvider.manifest.metadata.namespace


    # --- Step 2: Platform user (go-templating) ---
    # Creates a Platform User per pair and registers the pair's
    # vcluster as an external VirtualClusterInstance with the User as
    # owner. The User has NO password — participants do not log into
    # the Platform UI. Authentication is via per-pair OwnedAccessKeys
    # minted out-of-band by `task pairs:issue-kubeconfigs`, embedded
    # in the kubeconfig handed to each pair. See AGENTS.md
    # §"Per-pair kubeconfig issuance".
    - step: platform-user
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{ $pairId := .observed.composite.resource.spec.pairId }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: platform-user-{{ $pairId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: platform-user
            spec:
              forProvider:
                manifest:
                  apiVersion: management.loft.sh/v1
                  kind: User
                  metadata:
                    name: {{ $pairId }}
                  spec:
                    displayName: {{ $pairId }}
                    username: {{ $pairId }}
                    subject: {{ $pairId }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: platform-vci-access-{{ $pairId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: platform-vci-access
            spec:
              forProvider:
                manifest:
                  apiVersion: storage.loft.sh/v1
                  kind: VirtualClusterInstance
                  metadata:
                    name: {{ $pairId }}
                    namespace: p-default
                  spec:
                    # The vcluster itself is owned by Crossplane (the
                    # Helm Release composed above). Setting
                    # `external: true` + `clusterRef` tells the Loft
                    # Platform to register the existing vcluster
                    # instead of trying to deploy its own. Without it
                    # the platform reconciler races Crossplane to
                    # install a second Helm release for the same pair
                    # and fails with
                    # `HelmDeployFailed: virtual cluster version is required`.
                    external: true
                    clusterRef:
                      cluster: loft-cluster
                      namespace: participant-{{ $pairId }}
                      virtualCluster: {{ $pairId }}
                    # Loft validation requires `template` OR
                    # `templateRef` even on external VCIs, and the
                    # `syncNodeEnvironments` reconciler dereferences
                    # `spec.template` without a nil-check — omitting
                    # it panics the controller at
                    # `node_environments.go:51` and the VCI sticks in
                    # Pending. An empty object satisfies both.
                    template: {}
                    access:
                      - name: pair-owner
                        verbs: ["*"]
                        users: ["{{ $pairId }}"]
                      - name: admin-access
                        verbs: ["*"]
                        users: ["admin"]

    # --- Step 3: Auto-ready ---
    # Marks the XR as Ready when all composed resources are Ready.
    # Required because function-go-templating resources don't
    # propagate readiness to the composite by default.
    - step: auto-ready
      functionRef:
        name: function-auto-ready
