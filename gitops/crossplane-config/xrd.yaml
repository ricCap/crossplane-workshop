# XVCluster — the management-cluster API that provisions participant
# vclusters. Each XVCluster XR produces a Helm release of the
# loft-sh/vcluster chart via provider-helm.
#
# Crossplane v2 XRD, no claim layer — participants and tooling apply
# `XVCluster` resources directly. Scope is `Cluster` because the
# Composition emits cluster-scoped MRs (provider-helm `Release`,
# provider-kubernetes `Object`); v2 forbids a namespaced XR from
# composing cluster-scoped resources. Revisit once provider-helm and
# provider-kubernetes ship namespaced MR variants.
#
# This is the "gotcha moment" reveal: participants discover that the
# vcluster they've been using the whole workshop was itself produced
# by a Crossplane Composition.
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: xvclusters.workshop.example.io
spec:
  scope: Cluster
  group: workshop.example.io
  names:
    kind: XVCluster
    plural: xvclusters
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                pairId:
                  type: string
                  description: "Participant pair identifier (e.g. fancy-lemon)."
                quota:
                  type: object
                  description: "ResourceQuota limits for the participant namespace."
                  properties:
                    cpu:
                      type: string
                      default: "2"
                    memory:
                      type: string
                      default: "4Gi"
                    limitsCpu:
                      type: string
                      default: "4"
                    limitsMemory:
                      type: string
                      default: "8Gi"
                    pods:
                      type: string
                      default: "30"
              required:
                - pairId
