# XDeveloperEnvironment — the management-cluster API that provisions
# participant developer environments. Each XR currently produces a
# Helm release of the loft-sh/vcluster chart via provider-helm, but
# the abstraction is intentionally implementation-agnostic: a future
# revision could swap in a real cluster, a Crossplane-managed
# namespace, or a different vcluster distribution without another
# rename.
#
# Crossplane v2 XRD, no claim layer — participants and tooling apply
# `XDeveloperEnvironment` resources directly. Scope is `Cluster`
# because the Composition emits cluster-scoped MRs (provider-helm
# `Release`, provider-kubernetes `Object`); v2 forbids a namespaced
# XR from composing cluster-scoped resources. Revisit once
# provider-helm and provider-kubernetes ship namespaced MR variants.
#
# This is the "gotcha moment" reveal: participants discover that the
# environment they've been using the whole workshop was itself
# produced by a Crossplane Composition.
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: xdeveloperenvironments.workshop.example.io
spec:
  scope: Cluster
  group: workshop.example.io
  names:
    kind: XDeveloperEnvironment
    plural: xdeveloperenvironments
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                pairId:
                  type: string
                  description: "Participant pair identifier (e.g. fancy-lemon)."
                quota:
                  type: object
                  description: "ResourceQuota limits for the participant namespace."
                  properties:
                    cpu:
                      type: string
                      default: "2"
                    memory:
                      type: string
                      default: "4Gi"
                    limitsCpu:
                      # Default raised from 4 → 6 so module 3's
                      # `helm install crossplane … --set webui.enabled=true`
                      # fits on top of the static baseline already
                      # consumed by the vcluster chart on the host
                      # namespace. coredns alone has a 1 CPU limit
                      # (chart default) and the vcluster syncer
                      # statefulset, crossplane core, rbac-manager,
                      # and upbound-controller-manager bring the
                      # baseline to ~2.7 CPU before module 3 runs.
                      # Apollo's pod (uxp-apollo 1 CPU + two
                      # LimitRange-defaulted 200m sidecars = 1.4 CPU)
                      # would then push past a 4 CPU cap. 6 CPU
                      # leaves headroom for module 4-6 providers and
                      # claims as well.
                      type: string
                      default: "6"
                    limitsMemory:
                      type: string
                      default: "8Gi"
                    pods:
                      type: string
                      default: "30"
              required:
                - pairId
