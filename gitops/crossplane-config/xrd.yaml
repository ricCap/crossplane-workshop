# XDeveloperEnvironment — the management-cluster API that provisions
# participant developer environments. Each XR currently produces a
# Helm release of the loft-sh/vcluster chart via provider-helm, but
# the abstraction is intentionally implementation-agnostic: a future
# revision could swap in a real cluster, a Crossplane-managed
# namespace, or a different vcluster distribution without another
# rename.
#
# Crossplane v2 XRD, no claim layer — participants and tooling apply
# `XDeveloperEnvironment` resources directly. Scope is `Cluster`
# because the Composition emits cluster-scoped MRs (provider-helm
# `Release`, provider-kubernetes `Object`); v2 forbids a namespaced
# XR from composing cluster-scoped resources. Revisit once
# provider-helm and provider-kubernetes ship namespaced MR variants.
#
# This is the "gotcha moment" reveal: participants discover that the
# environment they've been using the whole workshop was itself
# produced by a Crossplane Composition.
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: xdeveloperenvironments.workshop.example.io
spec:
  scope: Cluster
  group: workshop.example.io
  names:
    kind: XDeveloperEnvironment
    plural: xdeveloperenvironments
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                pairId:
                  type: string
                  description: "Participant pair identifier (e.g. fancy-lemon)."
                quota:
                  type: object
                  description: "ResourceQuota limits for the participant namespace."
                  # `default: {}` on the parent is required for the
                  # child defaults below to actually fire when an XR
                  # ships without a `spec.quota` block at all (which
                  # is the common case — see gitops/participant-xrs/).
                  # OpenAPI schema defaulting only walks into a
                  # subtree when the parent object is present, so
                  # without this line every child `default:` is dead
                  # code for absent-quota XRs and the Composition's
                  # base manifest is the only thing that ever takes
                  # effect (see #40 → #41 for the test that surfaced
                  # this).
                  #
                  # `cpu`, `memory`, `limitsCpu`, `limitsMemory` are
                  # currently inert: the Composition stopped wiring
                  # them through to the per-pair ResourceQuota as a
                  # workaround for argoproj/argo-cd#26529. They become
                  # live again once that issue ships.
                  default: {}
                  properties:
                    # CPU/memory defaults tripled from the original
                    # 2/4Gi/6/8Gi sizing once participants started
                    # pushing past the caps in module 06 (full
                    # provider-arubacloud + provider-github stack on
                    # top of UXP + webui). The historical rationale
                    # for the 6 CPU limitsCpu value (Apollo's 1.4 CPU
                    # footprint on top of the ~2.7 CPU vcluster/UXP
                    # baseline) still holds — tripling just gives
                    # comfortable headroom for module 04-06 providers
                    # and learner experimentation.
                    cpu:
                      type: string
                      default: "6"
                    memory:
                      type: string
                      default: "12Gi"
                    limitsCpu:
                      type: string
                      default: "18"
                    limitsMemory:
                      type: string
                      default: "24Gi"
                    pods:
                      type: string
                      default: "90"
              required:
                - pairId
