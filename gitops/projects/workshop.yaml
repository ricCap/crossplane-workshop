# AppProject scoping every Application the workshop manages.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: workshop
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Crossplane workshop — participant vclusters and supporting apps.
  sourceRepos:
    - git@github.com:ricCap/crossplane-workshop.git
    # Still needed: provider-helm fetches the vcluster chart from here
    - https://charts.loft.sh
    - https://charts.upbound.io/stable
    - https://charts.jetstack.io
  destinations:
    # Management cluster — for the bulk of the GitOps tree (Crossplane,
    # vCluster Platform, Envoy Gateway, docs, etc.).
    - namespace: '*'
      server: https://kubernetes.default.svc
    # Per-pair vclusters — for the Aruba bundle ApplicationSet
    # (`gitops/apps/vcluster-aruba-bundle.yaml`). Each pair's vcluster
    # is registered as an ArgoCD Cluster Secret with server URL
    # `https://<pair>.participant-<pair>:443` (see
    # `task workshop:enable-aruba`). Without this entry the
    # ApplicationSet's `aruba-bundle-<pair>` Applications are
    # rejected at admission with `InvalidSpecError: ... do not match
    # any of the allowed destinations`.
    - namespace: '*'
      server: 'https://*.participant-*:443'
  # Wildcard resource whitelist — accepted residual (#120). The
  # workshop's app-of-apps pattern syncs many distinct Applications
  # (Crossplane, UXP Apollo, vCluster Platform, Envoy Gateway,
  # cert-manager, the per-pair Aruba bundle, …); each ships its own
  # mix of cluster-scoped + namespaced kinds. Enumerating every
  # group/kind here is high-effort and high-regression-risk: a
  # missing kind blocks ArgoCD sync mid-workshop with no fast
  # workaround.
  #
  # The operative defenses against malicious manifests landing in
  # main are upstream of the AppProject:
  #   - branch protection on main + required PR review
  #   - DCO sign-off + Assisted-by trailer enforcement on commits
  #   - sourceRepos pin (above) — only this repo + four trusted
  #     chart repos can be referenced as sources
  #
  # Worth a structured pass to enumerate kinds if the workshop ever
  # runs against a multi-tenant management cluster shared with
  # production workloads. Until then the wildcard is intentional.
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  orphanedResources:
    warn: true
