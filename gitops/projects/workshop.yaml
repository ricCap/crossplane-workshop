# AppProject scoping every Application the workshop manages.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: workshop
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Crossplane workshop — participant vclusters and supporting apps.
  sourceRepos:
    - git@github.com:ricCap/crossplane-workshop.git
    # Still needed: provider-helm fetches the vcluster chart from here
    - https://charts.loft.sh
    - https://charts.crossplane.io/stable
    - https://charts.jetstack.io
    - oci://docker.io/envoyproxy/gateway-helm
  destinations:
    - namespace: '*'
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  orphanedResources:
    warn: true
