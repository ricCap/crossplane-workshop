# Redirect all HTTP traffic to HTTPS. Attached to the HTTP listener
# of the workshop Gateway — any request on port 80 gets a 301 to
# the same URL on HTTPS.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-to-https
  namespace: envoy-gateway-system
spec:
  parentRefs:
    - name: workshop
      namespace: envoy-gateway-system
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
