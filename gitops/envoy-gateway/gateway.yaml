# PROTOTYPE: plain-HTTP docs while LE is blocked by broken hairpin NAT.
#
# All TLS removed. The docs site serves over HTTP on port 80 — no cert,
# no redirect. Tradeoff:
#   - vCluster Platform (loft) effectively requires HTTPS for the
#     admin/login flow. With this prototype Platform UI loads but the
#     participant kubeconfig path is broken. Use only if you accept
#     losing Platform-mediated verify (verify:pair:platform / MODE=
#     platform) and operate on local kubeconfigs instead.
#   - HSTS preload, secure cookies, etc. all gone. Don't ship this past
#     workshop day.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: workshop
  namespace: envoy-gateway-system
spec:
  gatewayClassName: eg
  listeners:
    # Single HTTP listener serving every workshop hostname plain-text.
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
