# Central Gateway for the workshop. HTTPS-only with HTTP→HTTPS redirect.
# cert-manager issues a Let's Encrypt TLS cert for the HTTPS listener.
#
# All HTTPRoutes in the cluster reference this Gateway via parentRefs.
# The Gateway lives in envoy-gateway-system but accepts routes from
# all namespaces.
#
# Local dev: `task wall:ui` port-forwards the HTTPS listener.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: workshop
  namespace: envoy-gateway-system
  annotations:
    # PROTOTYPE: swapped from `letsencrypt-prod` to `workshop-ca` while
    # ACME HTTP-01 is blocked by broken hairpin NAT on the cloud LB.
    # Self-signed CA from gitops/cert-manager/selfsigned-issuer.yaml.
    # Participants will see browser warnings unless they trust the
    # workshop-ca Secret manually.
    cert-manager.io/cluster-issuer: workshop-ca
spec:
  gatewayClassName: eg
  listeners:
    # HTTP listener — only serves redirects to HTTPS.
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    # HTTPS listener — all real traffic terminates here.
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "crossplane.workshop.riccardocapraro.com"
      tls:
        mode: Terminate
        certificateRefs:
          - name: workshop-tls
      allowedRoutes:
        namespaces:
          from: All
    # HTTPS listener for vCluster Platform UI + API.
    # cert-manager issues a separate Let's Encrypt cert for this hostname.
    - name: https-platform
      protocol: HTTPS
      port: 443
      hostname: "platform-crossplane.workshop.riccardocapraro.com"
      tls:
        mode: Terminate
        certificateRefs:
          - name: platform-tls
      allowedRoutes:
        namespaces:
          from: All
