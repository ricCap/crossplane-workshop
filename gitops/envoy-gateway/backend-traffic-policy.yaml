# Per-source-IP rate limiting on all Gateway listeners.
# Mitigates brute-force on the Platform login and general abuse.
# Uses Local rate limiting (no Redis needed — single Envoy replica).
#
# Limit must accommodate `helm install` against the participant vcluster
# apiserver: a single install (e.g. UXP) bursts ~50–100 req/s during
# parallel discovery and resource existence checks. 20 rps caused 429s on
# `helm install` (see ClusterRoleBinding discovery 429 incident). 200 rps
# leaves comfortable headroom while still capping abusive traffic.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: workshop-rate-limit
  namespace: envoy-gateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: workshop
  rateLimit:
    type: Local
    local:
      rules:
        - clientSelectors:
            - sourceCIDR:
                value: "0.0.0.0/0"
                type: Distinct
          limit:
            requests: 200
            unit: Second
