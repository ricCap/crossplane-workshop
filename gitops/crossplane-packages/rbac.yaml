# Scoped RBAC for provider-helm and provider-kubernetes on the
# management cluster. Deliberately NOT cluster-admin — we grant only
# the verbs and resources the vcluster chart + the Composition's
# Ingress/ResourceQuota/Namespace objects actually need.
#
# DeploymentRuntimeConfigs pin the SA names so we can bind them here
# without guessing Crossplane's hash suffix.
---
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: provider-helm-runtime
spec:
  serviceAccountTemplate:
    metadata:
      name: provider-helm
---
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: provider-kubernetes-runtime
spec:
  serviceAccountTemplate:
    metadata:
      name: provider-kubernetes
---
# What provider-helm needs to install the vcluster chart:
# namespaces, core resources, workloads, RBAC (syncer SA/roles).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crossplane-provider-helm
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - pods
      - services
      - secrets
      - configmaps
      - serviceaccounts
      - persistentvolumeclaims
      - endpoints
      - events
    verbs: ["*"]
  - apiGroups: ["apps"]
    resources: ["statefulsets", "deployments", "replicasets"]
    verbs: ["*"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["*"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["*"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["*"]
  # Helm release state is stored as secrets — covered above.
  # CRDs for vcluster internal use
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: provider-helm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crossplane-provider-helm
subjects:
  - kind: ServiceAccount
    name: provider-helm
    namespace: crossplane-system
---
# What provider-kubernetes needs: HTTPRoute, ResourceQuota, Namespace,
# Secrets (Platform password), and management.loft.sh Users.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crossplane-provider-kubernetes
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    # `delete` is required so provider-kubernetes can clean up the
    # per-pair Namespace Object when an XVCluster XR is deleted —
    # without it, the Object hangs in `Deleting` and the XR never
    # finishes garbage collection.
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["resourcequotas"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["*"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["*"]
  - apiGroups: ["management.loft.sh"]
    resources: ["users"]
    verbs: ["*"]
  - apiGroups: ["storage.loft.sh"]
    resources: ["virtualclusterinstances"]
    verbs: ["*"]
  # Platform User creation requires binding users at the cluster scope
  - apiGroups: [""]
    resources: ["users"]
    verbs: ["bind", "create", "get", "list", "watch", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: provider-kubernetes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crossplane-provider-kubernetes
subjects:
  - kind: ServiceAccount
    name: provider-kubernetes
    namespace: crossplane-system
---
# Workaround for an UXP v2.2.0-up.5 chart bug: `crossplane-init`
# reinstalls the (alpha) `storeconfigs.secrets.crossplane.io` CRD
# during the CoreCRDs step and then tries to create a default
# StoreConfig, but the bundled `crossplane` ClusterRole no longer
# grants any verbs on storeconfigs. The pod fails to initialize with:
#
#   cannot initialize core: cannot create default store config:
#   storeconfigs.secrets.crossplane.io is forbidden: User
#   "system:serviceaccount:crossplane-system:crossplane" cannot create
#   resource "storeconfigs" in API group "secrets.crossplane.io" at
#   the cluster scope
#
# We grant the missing perms via an aggregated ClusterRole so the fix
# survives chart upgrades. Remove once the upstream chart ships the
# rule itself (or once external secret stores are fully removed in
# a future UXP release).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crossplane-storeconfigs-shim
  labels:
    rbac.crossplane.io/aggregate-to-crossplane: "true"
rules:
  - apiGroups: ["secrets.crossplane.io"]
    resources: ["storeconfigs", "storeconfigs/status"]
    verbs: ["*"]
