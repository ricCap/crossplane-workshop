# Grant provider-helm cluster-admin so it can create namespaces,
# StatefulSets, Services, Secrets, and everything else the vcluster
# chart renders. Same justification as the per-vcluster cluster-admin
# in module 2 — workshop is throwaway, narrow scoping is a detour.
#
# The SA name follows Crossplane's convention: provider-helm-<hash>.
# Rather than guessing the hash, we use a DeploymentRuntimeConfig to
# assign a known SA name.
---
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: provider-helm-runtime
spec:
  serviceAccountTemplate:
    metadata:
      name: provider-helm
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: provider-helm-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: provider-helm
    namespace: crossplane-system
