# Default Platform project. Membership/access trade-off:
#
# Per-pair users need *some* project membership to navigate the
# Platform UI to their VCI — without it the UI shows them an empty
# project and they cannot reach their vcluster (verified live: pure
# admin-only membership left participants locked out, even though
# the per-pair `VirtualClusterInstance.spec.access` rules emitted
# by the DeveloperEnvironment Composition were correctly in place).
#
# The wildcard `User: "*"` member with `loft-management-project-user`
# below restores that UI access. Trade-off (#116): an authenticated
# pair user can list other pair users + cluster + template names
# (subresource `get` only — no read of secrets, no write). For a
# friendly-participant 3h workshop this is an accepted residual.
# The proper fix is per-pair Project member emission from the
# Composition, but Loft Project is a singleton CRD; multiple
# Crossplane Objects can't safely each own a slice of `members`.
# Tracked in #116 — revisit if the workshop ever runs against a
# multi-tenant or hostile audience.
apiVersion: storage.loft.sh/v1
kind: Project
metadata:
  name: default
  annotations:
    loft.sh/project-namespace: p-default
    # Embedded apply payload mirrors `spec` so Platform doesn't
    # diff-and-revert on reconcile.
    loft.sh/apply: |
      {"kind":"Project","apiVersion":"storage.loft.sh/v1","metadata":{"name":"default"},"spec":{"displayName":"Default Project","description":"Workshop participant vclusters","quotas":{},"allowedClusters":[{"name":"*"}],"allowedRunners":[{"name":"*"}],"allowedTemplates":[{"kind":"VirtualClusterTemplate","group":"storage.loft.sh","name":"*"},{"kind":"SpaceTemplate","group":"storage.loft.sh","name":"*"}],"requireTemplate":{},"requirePreset":{},"members":[{"kind":"User","group":"storage.loft.sh","name":"admin","clusterRole":"loft-management-project-admin"},{"kind":"User","group":"storage.loft.sh","name":"*","clusterRole":"loft-management-project-user"}]},"status":{}}
spec:
  displayName: Default Project
  description: Workshop participant vclusters
  quotas: {}
  allowedClusters:
    - name: "*"
  allowedRunners:
    - name: "*"
  allowedTemplates:
    - kind: VirtualClusterTemplate
      group: storage.loft.sh
      name: "*"
    - kind: SpaceTemplate
      group: storage.loft.sh
      name: "*"
  requireTemplate: {}
  requirePreset: {}
  members:
    - kind: User
      group: storage.loft.sh
      name: admin
      clusterRole: loft-management-project-admin
    - kind: User
      group: storage.loft.sh
      name: "*"
      clusterRole: loft-management-project-user
  access:
    - name: loft-admin-access
      verbs: ["*"]
      users: ["admin"]
    - name: loft-user-access
      verbs: ["get"]
      users: ["*"]
      subresources:
        - members
        - clusters
        - templates
        - chartinfo
        - charts
