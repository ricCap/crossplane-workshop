# Routes traffic for platform-crossplane.workshops.riccardocapraro.com to vCluster Platform.
# Platform is installed via `task bootstrap:vcluster-platform` (not ArgoCD)
# to keep the admin password out of git.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vcluster-platform
  namespace: vcluster-platform
spec:
  parentRefs:
    - name: workshop
      namespace: envoy-gateway-system
      sectionName: https-platform
  hostnames:
    - "platform-crossplane.workshops.riccardocapraro.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Strict-Transport-Security
                value: "max-age=31536000; includeSubDomains"
              - name: X-Content-Type-Options
                value: "nosniff"
      backendRefs:
        - name: loft
          port: 80
