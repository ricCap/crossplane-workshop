# Routes the root path (`/`) to the docs Service via Gateway API.
# The Docusaurus site, /wall aggregator, and /api/* validator proxy
# all share this route. Same-origin with per-pair /team/<pair>/ routes
# lets iframes do relative fetch() without CORS.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: docs
  namespace: docs
spec:
  parentRefs:
    - name: workshop
      namespace: envoy-gateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: docs
          port: 80
