# Routes the root path (`/`) to the docs Service via Gateway API.
# Attached to the HTTPS listener only — HTTP is redirected by
# the http-to-https HTTPRoute in the gateway config.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: docs
  namespace: docs
spec:
  parentRefs:
    - name: workshop
      namespace: envoy-gateway-system
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: docs
          port: 80
