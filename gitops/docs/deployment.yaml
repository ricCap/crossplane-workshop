apiVersion: apps/v1
kind: Deployment
metadata:
  name: docs
  namespace: docs
  labels:
    app: docs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docs
  template:
    metadata:
      labels:
        app: docs
    spec:
      serviceAccountName: validator
      # Pull secret is provisioned imperatively by `task bootstrap:ghcr-pull-secret`
      # (see Taskfile). The images live under a private GHCR package.
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: docs
          # Pinned. Bump after a new vX.Y.Z is published. See AGENTS.md §Releasing.
          image: ghcr.io/riccap/crossplane-workshop-docs:v0.2.0
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30

        - name: validator
          # Pinned. Bump after a new vX.Y.Z is published. See AGENTS.md §Releasing.
          image: ghcr.io/riccap/crossplane-workshop-validator:v0.2.0
          ports:
            - name: http-validator
              containerPort: 8081
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http-validator
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http-validator
            initialDelaySeconds: 3
            periodSeconds: 10
