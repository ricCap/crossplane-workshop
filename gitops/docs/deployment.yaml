apiVersion: apps/v1
kind: Deployment
metadata:
  name: docs
  namespace: docs
  labels:
    app: docs
spec:
  # replicas managed by HPA (see hpa.yaml). ArgoCD ignores /spec/replicas on
  # this Deployment (see gitops/apps/docs.yaml) so selfHeal does not revert it.
  selector:
    matchLabels:
      app: docs
  template:
    metadata:
      labels:
        app: docs
    spec:
      serviceAccountName: validator
      # The Pod's SA is `validator` (cluster-wide get/list on secrets +
      # namespaces — needed by the validator binary). We disable auto-mount
      # here so the docs nginx container does NOT get a SA token on disk;
      # the token is projected only into the validator container below
      # (#110). If the docs static-file image is ever exploited, the
      # attacker has no kube-api credential to escalate with.
      automountServiceAccountToken: false
      # Pull secret is provisioned imperatively by `task bootstrap:ghcr-pull-secret`
      # (see Taskfile). The images live under a private GHCR package.
      imagePullSecrets:
        - name: ghcr-pull
      volumes:
        - name: kube-api-access
          projected:
            defaultMode: 420
            sources:
              - serviceAccountToken:
                  expirationSeconds: 3607
                  path: token
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
              - downwardAPI:
                  items:
                    - path: namespace
                      fieldRef:
                        apiVersion: v1
                        fieldPath: metadata.namespace
      containers:
        - name: docs
          # Pinned. Bump after a new vX.Y.Z is published. See AGENTS.md §Releasing.
          image: ghcr.io/riccap/crossplane-workshop-docs:v0.3.1
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30

        - name: validator
          # Pinned. Bump after a new vX.Y.Z is published. See AGENTS.md §Releasing.
          image: ghcr.io/riccap/crossplane-workshop-validator:v0.3.1
          ports:
            - name: http-validator
              containerPort: 8081
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          # The SA token is mounted ONLY here (see pod-level
          # automountServiceAccountToken: false above). client-go's
          # in-cluster config picks it up at the standard path.
          volumeMounts:
            - name: kube-api-access
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http-validator
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http-validator
            initialDelaySeconds: 3
            periodSeconds: 10
