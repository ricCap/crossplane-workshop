# RBAC for the validator ServiceAccount.
#
# Two privileges, both as narrow as Kubernetes RBAC permits:
#
# 1. Cluster-wide get/list on namespaces (this file). The validator
#    discovers pair IDs by listing `participant-*` namespaces; that
#    needs cluster-wide list. Namespaces have no secret content.
#
# 2. Per-pair get on `secrets/vc-<pair>` in `participant-<pair>`,
#    granted via Role+RoleBinding emitted by the DeveloperEnvironment
#    Composition (see gitops/crossplane-config/composition.yaml). RBAC
#    cluster-rules can't constrain by name, so we use namespace-scoped
#    Roles with `resourceNames` instead — that way the validator can
#    only read the specific kubeconfig secret for each registered pair,
#    not `crossplane-system/aruba-creds`, the GitHub App credentials,
#    or any other secret on the cluster (#112).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: validator
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: validator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: validator
subjects:
  - kind: ServiceAccount
    name: validator
    namespace: docs
