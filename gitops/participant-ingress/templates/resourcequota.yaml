{{- $pair := required "pairId is required" .Values.pairId -}}
# Loose guardrails so one pair can't accidentally starve the management
# cluster. Intentionally generous — the workshop content needs ~2
# Deployments, 2 Services, 1 ConfigMap, and one vcluster StatefulSet
# per pair. These limits leave plenty of room for experimentation in
# modules 4 and 5 without hitting quota errors.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: pair-quota
  namespace: participant-{{ $pair }}
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "4"
    limits.memory: 8Gi
    pods: "30"
    services: "20"
    configmaps: "30"
    secrets: "50"
    persistentvolumeclaims: "5"
