{{- $pair := required "pairId is required" .Values.pairId -}}
# Routes `/team/<pair>/...` on the shared ingress-nginx host to the
# pair's two synced Services in `participant-<pair>`. Participants
# create `frontend` and `backend` Services inside their vcluster in
# the `default` namespace; `sync.toHost.services: enabled: true` on
# the vcluster chart then materializes them on the host as
# `<svc>-x-default-x-<pair>` (verified against the existing
# `kube-dns-x-kube-system-x-<pair>` Service in the same namespace).
#
# Path order matters *in declaration*: ingress-nginx writes nginx
# location blocks in the order the rules appear, and we want the
# `/api` branch evaluated before the catch-all frontend branch.
# The regex capture groups + rewrite-target strip the `/team/<pair>`
# prefix so the upstream Services see clean paths — `nginx:alpine`
# wouldn't serve `index.html` for a URI of `/team/<pair>/` and
# `http-echo` ignores the path but we strip anyway for symmetry.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: team-{{ $pair }}
  namespace: participant-{{ $pair }}
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /team/{{ $pair }}/api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend-x-default-x-{{ $pair }}
                port:
                  number: 5678
          - path: /team/{{ $pair }}(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend-x-default-x-{{ $pair }}
                port:
                  number: 80
