{{/*
Defense in depth around the shared Aruba api-key Secret. The
provider-arubacloud Pod (which legitimately needs the credentials)
runs in `crossplane-system` and reads the Secret cross-namespace
via its ServiceAccount RBAC, NOT via Pod-level mount references.
So no participant Pod has a legitimate reason to envFrom / volume-
mount `aruba-creds`.

Deny any Pod that references a Secret named `aruba-creds` via:
  * env[*].valueFrom.secretKeyRef.name
  * envFrom[*].secretRef.name
  * volumes[*].secret.secretName

Catches the "I copy-pasted a manifest from a tutorial that mounts
the cloud creds" failure mode.
*/}}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: aruba-secret-no-pod-mount
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    policies.kyverno.io/category: Workshop / Aruba
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: |
      No participant Pod may reference Secret `aruba-creds` via
      env, envFrom, or volume. The provider Pod loads it via SA
      RBAC, not via Pod-level references.
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: deny-aruba-creds-pod-reference
      match:
        any:
          - resources:
              kinds: [Pod]
              operations: [CREATE, UPDATE]
      validate:
        message: >-
          Pods may not reference Secret `aruba-creds`. The Aruba
          provider reads it via its ServiceAccount; participant
          workloads don't need the cloud credentials.
        deny:
          conditions:
            any:
              - key: "{{`{{ request.object.spec.containers[].env[?valueFrom.secretKeyRef.name == 'aruba-creds'] | length(@) }}`}}"
                operator: GreaterThan
                value: 0
              - key: "{{`{{ request.object.spec.containers[].envFrom[?secretRef.name == 'aruba-creds'] | length(@) }}`}}"
                operator: GreaterThan
                value: 0
              - key: "{{`{{ request.object.spec.initContainers[].env[?valueFrom.secretKeyRef.name == 'aruba-creds'] | length(@) }}`}}"
                operator: GreaterThan
                value: 0
              - key: "{{`{{ request.object.spec.initContainers[].envFrom[?secretRef.name == 'aruba-creds'] | length(@) }}`}}"
                operator: GreaterThan
                value: 0
              - key: "{{`{{ request.object.spec.volumes[?secret.secretName == 'aruba-creds'] | length(@) }}`}}"
                operator: GreaterThan
                value: 0
