{{/*
Defense in depth around the shared Aruba api-key Secret. Aimed at
*participant* workloads â€” no Pod a participant deploys should
envFrom / volume-mount `aruba-creds`, because the Aruba provider
already has the only legitimate read path.

The provider-arubacloud Pod itself runs in `crossplane-system` and
*does* mount the Secret as a volume â€” upjet-based providers read
their ProviderConfig credentials off a file path inside the Pod,
not via Kubernetes API GET. Earlier versions of this comment
claimed otherwise; that was wrong. So the rule must explicitly
exempt `crossplane-system` (and `kyverno-system`, which has no
business with Aruba either way), otherwise it denies the provider
Pod and blocks every Aruba MR reconcile.

Deny any other Pod that references a Secret named `aruba-creds` via:
  * env[*].valueFrom.secretKeyRef.name
  * envFrom[*].secretRef.name
  * volumes[*].secret.secretName

Catches the "I copy-pasted a manifest from a tutorial that mounts
the cloud creds" failure mode.
*/}}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: aruba-secret-no-pod-mount
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    policies.kyverno.io/category: Workshop / Aruba
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: |
      No participant Pod may reference Secret `aruba-creds` via
      env, envFrom, or volume. The provider-arubacloud Pod in
      `crossplane-system` (which legitimately mounts the secret)
      is excluded by namespace.
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: deny-aruba-creds-pod-reference
      match:
        any:
          - resources:
              kinds: [Pod]
              operations: [CREATE, UPDATE]
      exclude:
        any:
          # Crossplane providers (upjet-based ones especially) mount
          # their ProviderConfig credentials secret as a volume and
          # read it from disk â€” the provider-arubacloud Pod genuinely
          # needs `aruba-creds`. Both namespaces are admin-controlled;
          # participants have no RBAC to create Pods in either.
          - resources:
              namespaces: [crossplane-system, kyverno-system]
      validate:
        message: >-
          Pods may not reference Secret `aruba-creds`. The Aruba
          provider in `crossplane-system` reads it on your behalf;
          participant workloads don't need the cloud credentials.
        deny:
          conditions:
            # Each JMESPath defaults to an empty array via `|| `[]``.
            # Without that, Pods missing one of the optional fields
            # (e.g. no `env`, no `initContainers`, no `volumes`) cause
            # `length(null)` to error during variable substitution
            # and Kyverno treats the failed condition as a violation â€”
            # a false-positive that blocks any Pod with an incomplete
            # spec shape, including the docs-conformant `mysql-client`
            # ping Pod in module 06 Â§7.4. Backticks around `[]` are
            # required by JMESPath for literal arrays but collide with
            # the usual `{{`â€¦`}}` Helm raw-string escape, so we use
            # `printf` to emit the Kyverno expression verbatim (same
            # idiom as 02-shape-database.yaml's `|| `0`` defaults).
            any:
              - key: '{{ printf "{{ request.object.spec.containers[].env[?valueFrom.secretKeyRef.name == ''aruba-creds''] || `[]` | length(@) }}" }}'
                operator: GreaterThan
                value: 0
              - key: '{{ printf "{{ request.object.spec.containers[].envFrom[?secretRef.name == ''aruba-creds''] || `[]` | length(@) }}" }}'
                operator: GreaterThan
                value: 0
              - key: '{{ printf "{{ request.object.spec.initContainers[].env[?valueFrom.secretKeyRef.name == ''aruba-creds''] || `[]` | length(@) }}" }}'
                operator: GreaterThan
                value: 0
              - key: '{{ printf "{{ request.object.spec.initContainers[].envFrom[?secretRef.name == ''aruba-creds''] || `[]` | length(@) }}" }}'
                operator: GreaterThan
                value: 0
              - key: '{{ printf "{{ request.object.spec.volumes[?secret.secretName == ''aruba-creds''] || `[]` | length(@) }}" }}'
                operator: GreaterThan
                value: 0
