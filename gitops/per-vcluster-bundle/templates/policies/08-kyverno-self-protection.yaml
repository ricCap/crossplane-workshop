{{/*
Kyverno self-protection. Without this, a participant who notices
they have admin in their vcluster could `kubectl delete
clusterpolicy aruba-allowed-kinds` and bypass every other policy
in this bundle. Same for the validating webhook config that hands
admission requests to Kyverno.

Threat model is non-malicious participants (per #43), so this is
"defence against accidents from people exploring the cluster",
not "defence against motivated attackers". The latter would also
require RBAC downgrade, which is out of scope for the workshop.

Allow CREATE/UPDATE because the bundle / Helm chart upgrades are
expected — but block any UPDATE that empties `spec.rules`, since
that's the specific "neuter the policy without deleting it" attack
(#114). Routine ArgoCD self-heal of unchanged manifests doesn't
trigger UPDATE, and bundle bumps add/replace rules rather than
removing them all.
*/}}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: kyverno-self-protection
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    policies.kyverno.io/category: Workshop / Aruba
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: |
      Block participants from deleting Kyverno policies and the
      Kyverno validating webhook configuration.
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: protect-clusterpolicies
      match:
        any:
          - resources:
              kinds:
                - kyverno.io/v1/ClusterPolicy
                - kyverno.io/v1/Policy
              operations:
                - DELETE
      validate:
        message: >-
          Kyverno policies may not be deleted. If a policy is
          blocking something legitimate, ask the workshop owner to
          relax it via PR.
        deny: {}
    # The above only catches DELETE. A vcluster-admin can equivalently
    # neuter a policy by `kubectl patch ... --type=json -p='[{"op":
    # "replace","path":"/spec/rules","value":[]}]'` — the policy
    # stays "present" (so any name-based check still passes) but with
    # zero rules, admission permits everything. This rule blocks that
    # specific attack while leaving legitimate edits (add/change a
    # rule) free to land via ArgoCD bundle bumps. (#114)
    - name: protect-clusterpolicies-no-empty-rules
      match:
        any:
          - resources:
              kinds:
                - kyverno.io/v1/ClusterPolicy
                - kyverno.io/v1/Policy
              operations:
                - UPDATE
      validate:
        message: >-
          Kyverno policy updates may not result in an empty
          `spec.rules` list. To remove a policy entirely, ask the
          workshop owner to drop it via PR.
        deny:
          conditions:
            all:
              - key: "{{`{{ request.object.spec.rules | length(@) }}`}}"
                operator: Equals
                value: 0
    - name: protect-webhook-config
      match:
        any:
          - resources:
              kinds:
                - admissionregistration.k8s.io/v1/ValidatingWebhookConfiguration
                - admissionregistration.k8s.io/v1/MutatingWebhookConfiguration
              # Match Kyverno's own webhook configurations by name
              # prefix. Other webhooks (e.g., Crossplane's) stay
              # unrestricted.
              names:
                - "kyverno-*"
                - "*-kyverno"
              operations:
                - DELETE
                - UPDATE
      validate:
        message: >-
          Kyverno's admission webhook configuration may not be
          modified or deleted by participants.
        deny: {}
