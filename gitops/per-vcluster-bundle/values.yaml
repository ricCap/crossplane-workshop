# Default values for the aruba-bundle chart.
# The ApplicationSet (gitops/apps/vcluster-aruba-bundle.yaml)
# overrides `pairId` per pair via Helm parameters at sync time.
# Other values are tuned here.

# Pair id — overridden by ApplicationSet from `{{name}}` (the
# participant vcluster's name as registered in ArgoCD's Cluster
# Secret). Used by:
#  * the workshop-pair-id ConfigMap (consumed by Kyverno policies
#    to enforce the per-pair name prefix on Aruba MRs).
#  * the Kyverno policies themselves — the per-pair prefix is
#    baked in at chart-render time so policies don't need a
#    runtime ConfigMap lookup.
#  * naming any pair-scoped resource the bundle creates.
pairId: ""

# provider-arubacloud OCI image. The workshop's release pinning
# story (Track 0.4 / `task release`) bumps this when the upstream
# provider ships a new tag.
provider:
  package: ghcr.io/riccap/provider-arubacloud:v0.3.0-workshop

# Shape policies — what participants are allowed to create. Tuned
# for the smoke-tested ITBG-Bergamo region; override per-event via
# Helm values if the workshop runs in a different region.
shapePolicies:
  # Aruba MR Kinds the workshop exposes. Anything else under any
  # `*.arubacloud.crossplane.io` group is denied at admission.
  # `DBaaS` is the headline MR module 06 walks participants through
  # (`docs/docs/06-crossplane-3xx/07-provider-arubacloud.mdx`); the
  # other three remain in case future modules use them.
  # See ricCap/provider-arubacloud#5 for the full v0.3.0-workshop kind list.
  allowedKinds:
    - DBaaS
    - Database
    - ContainerRegistry
    - BlockStorage
  # Aruba location codes the workshop allows. Default is the
  # Bergamo region we smoke-tested in #43. Locations not in this
  # list are rejected for Database / ContainerRegistry / BlockStorage.
  allowedLocations:
    - ITBG-Bergamo
  # Database engine + flavor whitelist. mysql-8.0 is the headline
  # workshop kind; DBO2A4 (2 CPU / 4Gi RAM) is the cheapest tier
  # we've validated. Add more as needed.
  database:
    allowedEngineIds:
      - mysql-8.0
    allowedFlavors:
      - DBO2A4
    maxStorageGb: 20
    # Per-pair MR object-count cap (#118). Without this a participant
    # can `for i in $(seq 1 1000); do kubectl apply -f db-$i.yaml`
    # and rack up unbounded billing. Workshop walks through 1
    # Database; allow 1 retry.
    maxCount: 2
  # `DBaaS` is the headline MR module 06 walks participants through
  # (`docs/docs/06-crossplane-3xx/07-provider-arubacloud.mdx`). The
  # apiVersion is `dbaas.arubacloud.crossplane.io/v1alpha1`, distinct
  # from `database.arubacloud.crossplane.io/v1alpha1/Database` above —
  # the count cap rule below targets the dbaas group specifically so
  # we don't conflate the two.
  dbaas:
    maxCount: 2
  containerRegistry:
    # Aruba's Container Registry "concurrent users flavor" tier.
    # See provider-arubacloud's containerregistry CRD `settings`
    # nested schema.
    allowedTiers:
      - Small
    maxCount: 3
  blockStorage:
    maxSizeGb: 50
    allowedTypes:
      - Standard
    maxCount: 5

# Kyverno sub-chart values. Workshop-tuned: keep the running
# footprint small (each per-pair vcluster runs its own copy).
kyverno:
  # Pin Kyverno to its own namespace. The Argo Application's
  # destination namespace is `default` (set by the ApplicationSet so
  # the rest of the bundle — Provider, ProviderConfig — lands
  # there), but Kyverno's policy engine resolves ConfigMap external
  # context against the namespace the controller runs in. Without
  # this override, Kyverno deploys to `default` while
  # `workshop-pair-id` lives in `kyverno-system`, and every policy
  # that references it silently fails to evaluate. The companion
  # Namespace template (templates/00-namespace-kyverno-system.yaml,
  # sync wave -1) creates the namespace before the chart's
  # resources reference it.
  namespaceOverride: kyverno-system
  # Disable the parts a workshop vcluster doesn't need. Most
  # workshop policies are simple admission validations; the cleanup
  # controller and the reports controller are overhead.
  cleanupController:
    enabled: false
  reportsController:
    enabled: false
  # Single replica everything — the workshop's per-pair
  # ResourceQuota (4Gi memory after #33's uplift) cannot afford the
  # default 3-replica admission/background controllers.
  admissionController:
    replicas: 1
  backgroundController:
    replicas: 1
  # CRDs install with the chart by default; keep it.
  crds:
    # Force Argo to use Server-Side Apply for the Kyverno CRDs.
    # Their OpenAPI schemas are massive, so a client-side apply
    # writes a `kubectl.kubernetes.io/last-applied-configuration`
    # annotation that pushes total annotation bytes past the 256KB
    # API server limit — observed on `policies.kyverno.io` and
    # `clusterpolicies.kyverno.io`, which fail to install with
    # `metadata.annotations: Too long: may not be more than 262144
    # bytes`. The Application's syncOption-level ServerSideApply is
    # not enough on its own; the per-CRD hint forces Argo to apply
    # them with SSA explicitly. (Chart's own values.yaml documents
    # this hook precisely for the ArgoCD use case.)
    annotations:
      argocd.argoproj.io/sync-options: ServerSideApply=true
  features:
    admissionReports:
      enabled: false
    backgroundScan:
      enabled: false
  # Disable the chart's three housekeeping hooks that all pull
  # `bitnami/kubectl:1.32.3`:
  #   * policyReportsCleanup  — post-upgrade, deletes legacy policyreports
  #   * webhooksCleanup       — pre-delete, removes chart webhooks
  #   * config.preserve       — post-delete, deletes the chart configmap
  #
  # Bitnami pulled its free Docker Hub images in 2025 (`bitnami/*` →
  # `bitnamilegacy/*`), so the upstream tag the chart pins no longer
  # resolves: the Jobs sit in `ImagePullBackOff` forever and the
  # pre-delete / post-delete hooks will block participant vcluster
  # teardown.
  #
  # All three hooks are housekeeping for chart upgrades / uninstalls
  # and have nothing to do in a fresh, short-lived workshop vcluster
  # (`reportsController.enabled: false` already keeps the report
  # collections empty; the workshop never customises the configmap,
  # so `config.preserve: false` is fine). Disabling them is cheaper
  # than carrying an image override that depends on the unguaranteed
  # `bitnamilegacy` mirror.
  webhooksCleanup:
    enabled: false
  policyReportsCleanup:
    enabled: false
  config:
    preserve: false
